name: Backstage — Build & Push Image

on:
  push:
    branches: [main]
    paths: ['backstage/**']
  pull_request:
    branches: [main]
    paths: ['backstage/**']

permissions:
  contents: read
  packages: write

jobs:
  check-runner:
    name: Check GitHub Runner
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      runner: ${{ steps.set.outputs.runner }}
    steps:
      - id: set
        run: echo "runner=ubuntu-latest" >> "$GITHUB_OUTPUT"

  build:
    name: Build Backstage Image
    needs: check-runner
    if: ${{ !cancelled() }}
    runs-on: ${{ needs.check-runner.outputs.runner || 'homelab' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backstage
          push: ${{ github.event_name == 'push' }}
          platforms: linux/amd64,linux/arm64
          provenance: false
          tags: |
            ghcr.io/diixtra/backstage:latest
            ghcr.io/diixtra/backstage:build-${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
