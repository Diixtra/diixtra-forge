name: Terraform — Cloudflare

on:
  pull_request:
    branches: [main]
    paths:
      - 'terraform/cloudflare/**'
  push:
    branches: [main]
    paths:
      - 'terraform/cloudflare/**'

# Prevent concurrent Terraform runs against the same state
concurrency:
  group: terraform-cloudflare
  cancel-in-progress: false

env:
  TF_WORKING_DIR: terraform/cloudflare

jobs:
  check-runner:
    name: Check GitHub Runner
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      runner: ${{ steps.set.outputs.runner }}
    steps:
      - id: set
        run: echo "runner=ubuntu-latest" >> "$GITHUB_OUTPUT"

  plan:
    name: Terraform Plan
    needs: check-runner
    if: ${{ (needs.check-runner.result == 'success' || needs.check-runner.result == 'failure') && github.event_name == 'pull_request' }}
    runs-on: ${{ needs.check-runner.outputs.runner || 'homelab' }}
    steps:
      - name: Log runner selection
        run: |
          if [ "${{ needs.check-runner.result }}" != "success" ]; then
            echo "::warning::GitHub-hosted runner unavailable — falling back to self-hosted runner"
            echo "### Runner Fallback" >> "$GITHUB_STEP_SUMMARY"
            echo "GitHub-hosted runner probe **failed**. Running on self-hosted \`homelab\` runner." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Checkout
        uses: actions/checkout@v6

      # 1Password GitHub Action injects secrets as environment variables.
      # This keeps the secret flow consistent: 1Password is always the source of truth.
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://Homela/cloudflare dns API Credentials/credential

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform plan -no-color -out=tfplan
        env:
          TF_VAR_cloudflare_api_token: ${{ env.CLOUDFLARE_API_TOKEN }}

      - name: Comment Plan on PR
        uses: actions/github-script@v8
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  apply:
    name: Terraform Apply
    needs: check-runner
    if: ${{ needs.check-runner.result == 'success' && github.ref == 'refs/heads/main' && github.event_name == 'push' }}
    runs-on: ${{ needs.check-runner.outputs.runner || 'homelab' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          CLOUDFLARE_API_TOKEN: op://Homela/cloudflare dns API Credentials/credential

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve
        env:
          TF_VAR_cloudflare_api_token: ${{ env.CLOUDFLARE_API_TOKEN }}
