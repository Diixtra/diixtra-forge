name: Post-Deploy Health Check
on:
  push:
    branches: [main]
    paths:
      - "infrastructure/**"
      - "platform/**"
      - "apps/**"
      - "clusters/**"

concurrency:
  group: post-deploy-check
  cancel-in-progress: true

jobs:
  health-check:
    name: Cluster Health Check
    runs-on: homelab
    if: "!startsWith(github.event.head_commit.message, 'Revert \"')"
    steps:
      - name: Install Flux CLI
        run: curl -s https://fluxcd.io/install.sh | FLUX_VERSION=2.4.0 bash

      - name: Trigger source reconciliation
        run: flux reconcile source git flux-system --timeout=2m

      - name: Wait for Kustomizations
        run: |
          echo "Waiting for all Kustomizations to reconcile..."
          for i in $(seq 1 60); do
            NOT_READY=$(flux get kustomizations --no-header | grep -v "True" || true)
            if [ -z "$NOT_READY" ]; then
              echo "All Kustomizations are Ready"
              flux get kustomizations
              exit 0
            fi
            echo "Attempt $i/60 — waiting 10s..."
            echo "$NOT_READY"
            sleep 10
          done
          echo "TIMEOUT: Kustomizations not ready after 10 minutes"
          flux get kustomizations
          exit 1

      - name: Wait for HelmReleases
        run: |
          echo "Waiting for all HelmReleases to reconcile..."
          for i in $(seq 1 60); do
            NOT_READY=$(flux get helmreleases -A --no-header | grep -v "True" || true)
            if [ -z "$NOT_READY" ]; then
              echo "All HelmReleases are Ready"
              flux get helmreleases -A
              exit 0
            fi
            echo "Attempt $i/60 — waiting 10s..."
            echo "$NOT_READY"
            sleep 10
          done
          echo "TIMEOUT: HelmReleases not ready after 10 minutes"
          flux get helmreleases -A
          exit 1

      - name: Validate cluster variables
        run: |
          echo "Checking critical cluster variables..."
          API_HOST=$(kubectl get configmap cluster-vars -n flux-system -o jsonpath='{.data.K8S_API_HOST}')
          if [ "$API_HOST" = "REPLACE_ME" ] || [ -z "$API_HOST" ]; then
            echo "FAIL: K8S_API_HOST is not set (currently: '$API_HOST')"
            echo "Cilium kube-proxy replacement requires the real control plane IP."
            exit 1
          fi
          echo "K8S_API_HOST: $API_HOST"

      - name: Verify Cilium health
        run: |
          echo "Checking Cilium agent health..."
          # Cilium is the sole CNI — zero pods is a hard failure
          CILIUM_PODS=$(kubectl get pods -n kube-system -l app.kubernetes.io/name=cilium-agent \
            --no-headers)
          if [ -z "$CILIUM_PODS" ]; then
            echo "FAIL: No Cilium agent pods found — cluster has no CNI"
            exit 1
          fi
          NOT_READY=$(echo "$CILIUM_PODS" | grep -v "Running" || true)
          if [ -n "$NOT_READY" ]; then
            echo "FAIL: Cilium agent pods not healthy:"
            echo "$NOT_READY"
            exit 1
          fi
          echo "All Cilium agent pods are Running"
          echo "$CILIUM_PODS"

      - name: Verify CiliumNetworkPolicies applied
        run: |
          echo "Checking CiliumNetworkPolicy resources..."
          if ! kubectl api-resources --api-group=cilium.io | grep -q CiliumNetworkPolicy; then
            echo "FAIL: CiliumNetworkPolicy CRD not found — Cilium CRDs may not be installed"
            exit 1
          fi
          CNP_COUNT=$(kubectl get ciliumnetworkpolicies -A --no-headers | wc -l)
          CCNP_COUNT=$(kubectl get ciliumclusterwidenetworkpolicies --no-headers | wc -l)
          echo "CiliumNetworkPolicies: $CNP_COUNT"
          echo "CiliumClusterwideNetworkPolicies: $CCNP_COUNT"
          if [ "$CNP_COUNT" -eq 0 ] && [ "$CCNP_COUNT" -eq 0 ]; then
            echo "FAIL: No CiliumNetworkPolicy resources found after reconciliation"
            exit 1
          fi
          kubectl get ciliumnetworkpolicies -A
          kubectl get ciliumclusterwidenetworkpolicies

      - name: Verify critical pods
        run: |
          echo "Checking for unhealthy pods..."
          FAILED=$(kubectl get pods -A --no-headers \
            --field-selector=status.phase!=Running,status.phase!=Succeeded \
            | grep -v "Completed" || true)
          if [ -n "$FAILED" ]; then
            echo "WARNING: Unhealthy pods detected:"
            echo "$FAILED"
            # Don't fail on pod issues — Flux readiness is the primary gate
            # Pods in CrashLoopBackOff may be pre-existing
          fi
          echo "Pod status summary:"
          kubectl get pods -A --no-headers | awk '{print $4}' | sort | uniq -c | sort -rn

  rollback:
    name: Auto Rollback
    needs: health-check
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Revert commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git revert HEAD --no-edit
          git push origin main

      - name: Create issue
        uses: actions/github-script@v8
        with:
          script: |
            const sha = '${{ github.sha }}'.substring(0, 7);
            const run = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-rollback: commit ${sha} failed health check`,
              body: `## What happened\n\nCommit ${sha} was automatically reverted because the post-deploy health check failed.\n\n**Reverted commit:** ${{ github.sha }}\n**Author:** @${{ github.event.head_commit.author.username }}\n**Message:** ${{ github.event.head_commit.message }}\n**Health check run:** ${run}\n\n## Next steps\n\n1. Check the [workflow run](${run}) logs to understand what failed\n2. Fix the issue on a branch\n3. Open a new PR`,
              labels: ['auto-rollback']
            });
