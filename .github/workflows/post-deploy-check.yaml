name: Post-Deploy Health Check
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "infrastructure/**"
      - "platform/**"
      - "apps/**"
      - "clusters/**"

# Queue deploys — never cancel or run in parallel.
# Concurrent reconciliations are the #1 source of cluster instability.
concurrency:
  group: cluster-deploy
  cancel-in-progress: false

jobs:
  health-check:
    name: Cluster Health Check
    runs-on: homelab
    timeout-minutes: 15
    if: "!startsWith(github.event.head_commit.message, 'Revert \"')"
    outputs:
      api_reachable: ${{ steps.preflight.outputs.api_reachable }}
    steps:
      - name: Install kubectl
        run: |
          set -euo pipefail
          if ! command -v kubectl &> /dev/null; then
            KUBECTL_VERSION=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
            BIN_DIR="${RUNNER_TEMP:-/tmp}/bin"
            mkdir -p "$BIN_DIR"
            curl -fsSL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" -o "$BIN_DIR/kubectl"
            chmod +x "$BIN_DIR/kubectl"
            echo "$BIN_DIR" >> "$GITHUB_PATH"
            echo "kubectl installed: $("$BIN_DIR/kubectl" version --client)"
          else
            echo "kubectl already available: $(kubectl version --client)"
          fi

      - name: Configure in-cluster kubectl
        run: |
          set -euo pipefail
          # kubectl ignores in-cluster config when any kubeconfig exists.
          # The runner image ships a default ~/.kube/config that points to
          # localhost:8080, so we must build one from the mounted SA creds.
          if [ -z "${KUBERNETES_SERVICE_HOST:-}" ] || [ -z "${KUBERNETES_SERVICE_PORT:-}" ]; then
            echo "::error::KUBERNETES_SERVICE_HOST/PORT not set — is the runner running inside the cluster?"
            exit 1
          fi
          if [ ! -f /var/run/secrets/kubernetes.io/serviceaccount/token ]; then
            echo "::error::SA token NOT mounted — ensure automountServiceAccountToken is true in the runner pod spec."
            exit 1
          fi
          kubectl config set-cluster k8s \
            --server="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}" \
            --certificate-authority=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          kubectl config set-credentials runner \
            --token="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
          kubectl config set-context default --cluster=k8s --user=runner
          kubectl config use-context default
          echo "Configured kubectl → https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"

      - name: Pre-flight — API server reachable
        id: preflight
        run: |
          set -euo pipefail
          for i in 1 2 3 4 5; do
            if kubectl get --raw /healthz --request-timeout=10s 2>&1; then
              echo "API server reachable"
              echo "api_reachable=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "Attempt $i/5 — API server not responding, waiting 15s..."
            sleep 15
          done
          echo "api_reachable=false" >> "$GITHUB_OUTPUT"
          echo "::error::API server unreachable after 5 attempts"
          exit 1

      - name: Install Flux CLI
        run: |
          if ! command -v flux &> /dev/null; then
            curl -fsSL https://fluxcd.io/install.sh | FLUX_VERSION=2.4.0 bash
            if ! command -v flux &> /dev/null; then
              echo "::error::Flux CLI installation failed — 'flux' binary not found after install"
              exit 1
            fi
            echo "Flux CLI installed: $(flux --version)"
          else
            echo "Flux CLI already available: $(flux --version)"
          fi

      - name: Trigger source reconciliation
        run: |
          # Retry the reconcile — the source controller may be restarting
          for i in 1 2 3; do
            if flux reconcile source git flux-system --timeout=2m 2>&1; then
              exit 0
            fi
            echo "Reconcile attempt $i failed, waiting 20s..."
            sleep 20
          done
          echo "::error::Source reconciliation failed after 3 attempts"
          exit 1

      - name: Wait for Kustomizations
        run: |
          echo "Waiting for all Kustomizations to reconcile..."
          for i in $(seq 1 60); do
            if ! FLUX_OUTPUT=$(flux get kustomizations --no-header 2>&1); then
              echo "Attempt $i/60 — flux get kustomizations failed: $FLUX_OUTPUT"
              sleep 10
              continue
            fi
            if [ -z "$FLUX_OUTPUT" ]; then
              echo "Attempt $i/60 — flux returned no kustomizations (CRDs may not be ready)"
              sleep 10
              continue
            fi
            NOT_READY=$(echo "$FLUX_OUTPUT" | grep -v "True" || true)
            if [ -z "$NOT_READY" ]; then
              echo "All Kustomizations are Ready"
              flux get kustomizations
              exit 0
            fi
            echo "Attempt $i/60 — waiting 10s..."
            echo "$NOT_READY"
            sleep 10
          done
          echo "TIMEOUT: Kustomizations not ready after 10 minutes"
          flux get kustomizations
          exit 1

      - name: Wait for HelmReleases
        run: |
          echo "Waiting for all HelmReleases to reconcile..."
          for i in $(seq 1 60); do
            if ! FLUX_OUTPUT=$(flux get helmreleases -A --no-header 2>&1); then
              echo "Attempt $i/60 — flux get helmreleases failed: $FLUX_OUTPUT"
              sleep 10
              continue
            fi
            if [ -z "$FLUX_OUTPUT" ]; then
              echo "Attempt $i/60 — flux returned no helmreleases (CRDs may not be ready)"
              sleep 10
              continue
            fi
            # Exclude nvidia-device-plugin: its DaemonSet needs a GPU node
            # with node.kubernetes.io/gpu=true label — schedules 0 pods otherwise
            NOT_READY=$(echo "$FLUX_OUTPUT" | grep -v "nvidia-device-plugin" | grep -v "True" || true)
            if [ -z "$NOT_READY" ]; then
              echo "All HelmReleases are Ready"
              flux get helmreleases -A
              exit 0
            fi
            echo "Attempt $i/60 — waiting 10s..."
            echo "$NOT_READY"
            sleep 10
          done
          echo "TIMEOUT: HelmReleases not ready after 10 minutes"
          flux get helmreleases -A
          exit 1

      - name: Verify critical pods
        run: |
          echo "Checking for unhealthy pods..."
          FAILED=$(kubectl get pods -A --no-headers \
            --field-selector=status.phase!=Running,status.phase!=Succeeded \
            | grep -v "Completed" || true)
          if [ -n "$FAILED" ]; then
            # Don't fail on pod issues — Flux readiness is the primary gate.
            # But surface it as a visible warning so operators notice.
            echo "::warning::Unhealthy pods detected after deploy — review if these are pre-existing or caused by this commit"
            echo "$FAILED"
          fi
          echo "Pod status summary:"
          kubectl get pods -A --no-headers | awk '{print $4}' | sort | uniq -c | sort -rn

  rollback:
    name: Auto Rollback
    needs: health-check
    # Only rollback when the API server was reachable but health checks failed.
    # If the API is unreachable, reverting won't help and creates a loop with
    # Flux image automation (revert → Flux pushes again → revert → ...).
    if: >-
      failure()
      && needs.health-check.outputs.api_reachable == 'true'
      && !startsWith(github.event.head_commit.message, 'Revert "')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Revert commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Merge commits (from PR merges) require -m 1 to specify which
          # parent to revert against. Without it, git revert fails with:
          #   "commit XXXXX is a merge but no -m option was given"
          PARENTS=$(git cat-file -p HEAD | grep -c '^parent')
          if [ "$PARENTS" -gt 1 ]; then
            git revert -m 1 HEAD --no-edit
          else
            git revert HEAD --no-edit
          fi
          git push origin main

      - name: Create issue
        uses: actions/github-script@v8
        with:
          script: |
            const sha = '${{ github.sha }}'.substring(0, 7);
            const run = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Auto-rollback: commit ${sha} failed health check`,
              body: `## What happened\n\nCommit ${sha} was automatically reverted because the post-deploy health check failed.\n\n**Reverted commit:** ${{ github.sha }}\n**Author:** @${{ github.event.head_commit.author.username }}\n**Message:** ${{ github.event.head_commit.message }}\n**Health check run:** ${run}\n\n## Next steps\n\n1. Check the [workflow run](${run}) logs to understand what failed\n2. Fix the issue on a branch\n3. Open a new PR`,
              labels: ['auto-rollback']
            });
