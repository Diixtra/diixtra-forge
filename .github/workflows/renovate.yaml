# ══════════════════════════════════════════════════════════════════
# Renovate Bot — Self-Hosted via GitHub Actions + 1Password
# ══════════════════════════════════════════════════════════════════
name: Renovate
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: renovate
  cancel-in-progress: true

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v3
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          RENOVATE_TOKEN: op://Homelab/renovate-github-pat/credential

      - name: Verify token loaded
        run: |
          if [ -z "$RENOVATE_TOKEN" ]; then
            echo "::error::RENOVATE_TOKEN is empty - 1Password load failed"
            exit 1
          fi
          echo "Token loaded (length: ${#RENOVATE_TOKEN})"
          # Test the token can access the repo API
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $RENOVATE_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}")
          echo "GitHub API response: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Token cannot access repo (HTTP $HTTP_CODE)"
            exit 1
          fi
        env:
          RENOVATE_TOKEN: ${{ env.RENOVATE_TOKEN }}

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.1
        with:
          configurationFile: .renovaterc
          token: ${{ env.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: ${{ github.repository }}
