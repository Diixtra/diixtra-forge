# =============================================================================
# Debian 13 (Trixie) Preseed Configuration
# =============================================================================
#
# LEARNING NOTE — WHAT IS PRESEED:
#   Preseed is Debian's mechanism for automating the installer (d-i, the
#   Debian Installer). It's a flat text file of key=value pairs that
#   pre-answer every question the installer would normally ask. Ubuntu
#   used preseed until 20.04, then switched to autoinstall (Subiquity).
#   Debian still uses preseed for the traditional installer.
#
#   The format is: d-i <component>/<question> <type> <value>
#     d-i           = "Debian Installer" prefix
#     component     = which installer module handles this
#     question      = the specific setting
#     type          = string, boolean, select, password, etc.
#     value         = the answer
#
# LEARNING NOTE — PRESEED vs AUTOINSTALL:
#   Preseed: Flat key=value, fragile (wrong key = interactive prompt),
#     no validation, hard to debug. But universal across Debian/Ubuntu<20.04.
#   Autoinstall: YAML, validated schema, better error messages, cloud-init
#     integration. But Ubuntu-only (20.04+).
#
#   Debian 13 may eventually move to a new installer, but for now preseed
#   is the standard approach.

# ── Locale & Keyboard ──────────────────────────────────────────────
d-i debian-installer/locale string en_GB.UTF-8
d-i keyboard-configuration/xkb-keymap select gb

# ── Network ─────────────────────────────────────────────────────────
# DHCP on the first interface. Hostname is temporary — cloud-init or
# manual config will set the real hostname after cloning.
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string k8s-debian-template
d-i netcfg/get_domain string local

# ── Mirror ──────────────────────────────────────────────────────────
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string

# ── Clock & Timezone ────────────────────────────────────────────────
d-i clock-setup/utc boolean true
d-i time/zone string Europe/London

# ── Partitioning ────────────────────────────────────────────────────
# LEARNING NOTE — LVM WITH PRESEED:
#   The partitioning recipe tells the installer to:
#   1. Use the entire disk (no dual-boot)
#   2. Set up LVM (for easy resizing later)
#   3. Put everything in one volume group
#   4. Use the "atomic" recipe (single root partition — simplest)
#   5. `lv_max` means the logical volume uses all available space
d-i partman-auto/method string lvm
d-i partman-auto-lvm/guided_size string max
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# ── User Account ────────────────────────────────────────────────────
# Skip root account — use sudo instead (modern best practice)
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Packer Build User
d-i passwd/username string packer
# Password: "packer" — only used during Packer build, not in production
d-i passwd/user-password-crypted password $6$randomsalt$Y9I6baU6/XBXbwHqL9WqhUxEtpn068Ssu.yflHxMZNsO9tIi1ARi9m1vhY8szl1bF.So//IYQx378cx9SFCDF/

# ── Package Selection ───────────────────────────────────────────────
# Minimal server — no desktop, no GUI. The provisioning script adds
# the K8s-specific packages.
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string \
    sudo \
    qemu-guest-agent \
    cloud-init \
    curl \
    ca-certificates \
    gnupg

# No automatic updates during install (we control updates via the image)
d-i pkgsel/upgrade select full-upgrade
d-i pkgsel/update-policy select none

# ── GRUB ────────────────────────────────────────────────────────────
# Install GRUB to the primary disk. The `true` for install_to means
# "install without asking" and the empty `only_debian` means "don't
# check for other operating systems."
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

# ── Post-install ────────────────────────────────────────────────────
# LEARNING NOTE — PRESEED LATE_COMMAND:
#   late_command runs after installation but before reboot, inside a
#   chroot of the installed system (/target). It's the equivalent of
#   autoinstall's late-commands. We use it to:
#   1. Give the packer user passwordless sudo (Packer needs it)
#   2. Enable the QEMU guest agent service
d-i preseed/late_command string \
    in-target bash -c 'echo "packer ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/packer && chmod 440 /etc/sudoers.d/packer'; \
    in-target bash -c 'sed -i "s/^#*PasswordAuthentication.*/PasswordAuthentication yes/" /etc/ssh/sshd_config'; \
    in-target systemctl enable qemu-guest-agent

# ── Finish ──────────────────────────────────────────────────────────
# Reboot after installation (Packer waits for SSH after reboot)
d-i finish-install/reboot_in_progress note
