apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config
  namespace: caddy-system
  labels:
    app.kubernetes.io/name: caddy
    app.kubernetes.io/part-of: caddy
    app.kubernetes.io/managed-by: flux
data:
  Caddyfile: |
    {
      # Global options
      email ${ACME_EMAIL}
    }

    # Service routes are defined per-environment via Kustomize overlays.
    # This base Caddyfile is a structural placeholder that overlays patch.
    :80 {
      respond "Caddy is running" 200
    }
