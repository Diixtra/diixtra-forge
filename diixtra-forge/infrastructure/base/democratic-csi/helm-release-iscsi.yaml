# ══════════════════════════════════════════════════════════════════
# democratic-csi iSCSI Driver — Dynamic Block Storage from TrueNAS
# ══════════════════════════════════════════════════════════════════
#
# LEARNING NOTE — NFS vs iSCSI, WHEN TO USE WHICH:
#
#   NFS (file storage):
#   ✅ ReadWriteMany — multiple pods can mount simultaneously
#   ✅ Simpler — just NFS mount, no block device management
#   ✅ Better for: shared configs, logs, static files, media
#   ❌ Higher latency for random I/O
#   ❌ No raw block device support
#
#   iSCSI (block storage):
#   ✅ ReadWriteOnce — exclusive access = consistent performance
#   ✅ Lower latency — raw block device, no NFS overhead
#   ✅ Better for: databases (Postgres, MySQL), message queues, caches
#   ✅ Supports filesystem choice (ext4, xfs)
#   ❌ Single pod access only (no ReadWriteMany)
#   ❌ More complex — iSCSI initiator, LUNs, targets
#
#   Rule of thumb: use NFS unless you need database-level I/O.
# ══════════════════════════════════════════════════════════════════
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: truenas-iscsi
  namespace: democratic-csi
spec:
  interval: 1h
  chart:
    spec:
      chart: democratic-csi
      version: "*"          # Lab: always use latest
      sourceRef:
        kind: HelmRepository
        name: democratic-csi
        namespace: flux-system
      interval: 1h

  valuesFrom:
    - kind: Secret
      name: truenas-api-key
      valuesKey: credential
      targetPath: driver.config.httpConnection.apiKey

  values:
    csiDriver:
      name: "org.democratic-csi.iscsi"

    storageClasses:
      - name: truenas-iscsi
        defaultClass: false
        reclaimPolicy: Delete
        volumeBindingMode: Immediate
        allowVolumeExpansion: true
        parameters:
          # ext4 is the safe default. xfs is better for large files
          # and parallel I/O but slightly harder to shrink.
          fsType: ext4

    volumeSnapshotClasses:
      - name: truenas-iscsi-snap
        parameters:
          detachedSnapshots: "false"

    driver:
      config:
        driver: freenas-api-iscsi

        httpConnection:
          protocol: https
          host: ${TRUENAS_HOST}
          port: 443
          # apiKey injected via valuesFrom
          allowInsecure: true

        zfs:
          # PLACEHOLDERS — each environment MUST override via Kustomize patch
          datasetParentName: OVERRIDE_IN_ENV_PATCH
          detachedSnapshotsDatasetParentName: OVERRIDE_IN_ENV_PATCH

          # zvol block size — 16K is optimal for most database workloads
          zvolBlocksize: "16K"
          zvolCompression: ""
          zvolDedup: ""
          zvolEnableReservation: false

        iscsi:
          # TrueNAS iSCSI target settings
          targetPortal: "${TRUENAS_ISCSI_PORTAL}"
          # ⚠️  Verify this matches your TrueNAS iSCSI base name
          # Check: System → Services → iSCSI → pencil → Base Name
          namePrefix: csi-
          nameSuffix: ""

          targetPortals: []
          interface: ""

          # ⚠️  Verify portal ID via API (WebUI can show wrong value):
          # curl -k -H "Authorization: Bearer API_KEY" \
          #   https://${TRUENAS_HOST}/api/v2.0/iscsi/portal
          targetGroups:
            - targetGroupPortalGroup: 1
              targetGroupInitiatorGroup: null
              targetGroupAuthType: None
              targetGroupAuthGroup: null

          extentInsecureTpc: true
          extentXenCompat: false
          extentDisablePhysicalBlocksize: true
          # 512 for best compatibility, 4096 for modern systems
          extentBlocksize: 512
          extentRpm: "SSD"
          extentAvailThreshold: 0
