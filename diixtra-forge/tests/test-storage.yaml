# ══════════════════════════════════════════════════════════════════
# Storage Test — Verify democratic-csi is working
# ══════════════════════════════════════════════════════════════════
#
# Apply this manually after setup to verify dynamic provisioning:
#   kubectl apply -f tests/test-storage.yaml
#   kubectl get pvc -n default    # Should go from Pending → Bound
#   kubectl exec test-nfs -- cat /data/hello.txt   # Should print "NFS works!"
#
# Clean up:
#   kubectl delete -f tests/test-storage.yaml
# ══════════════════════════════════════════════════════════════════

---
# Test NFS dynamic provisioning
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-nfs-pvc
  namespace: default
spec:
  storageClassName: truenas-nfs
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: test-nfs
  namespace: default
spec:
  containers:
    - name: test
      image: busybox:latest
      command: ["sh", "-c", "echo 'NFS works!' > /data/hello.txt && cat /data/hello.txt && sleep 3600"]
      volumeMounts:
        - name: test-vol
          mountPath: /data
  volumes:
    - name: test-vol
      persistentVolumeClaim:
        claimName: test-nfs-pvc

---
# Test iSCSI dynamic provisioning
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: test-iscsi-pvc
  namespace: default
spec:
  storageClassName: truenas-iscsi
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

---
apiVersion: v1
kind: Pod
metadata:
  name: test-iscsi
  namespace: default
spec:
  containers:
    - name: test
      image: busybox:latest
      command: ["sh", "-c", "echo 'iSCSI works!' > /data/hello.txt && cat /data/hello.txt && sleep 3600"]
      volumeMounts:
        - name: test-vol
          mountPath: /data
  volumes:
    - name: test-vol
      persistentVolumeClaim:
        claimName: test-iscsi-pvc
