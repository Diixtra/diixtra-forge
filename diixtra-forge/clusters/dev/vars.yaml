# Dev cluster variables — override for dev environment
# See clusters/homelab/vars.yaml for documentation on each variable.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-vars
  namespace: flux-system
data:
  # ── Domain Configuration ────────────────────────────────────────
  DOMAIN: "kazie.co.uk"
  LAB_DOMAIN: "dev.kazie.co.uk"
  ACME_EMAIL: "james@kazie.co.uk"
  FLUX_GIT_EMAIL: "flux@kazie.co.uk"

  # ── 1Password Configuration ────────────────────────────────────
  OP_VAULT: "Homelab"
  OP_ITEM_CLOUDFLARE: "cloudflare dns API Credentials"
  OP_ITEM_TRUENAS: "Truenas API Credential"

  # ── Network Configuration ──────────────────────────────────────
  METALLB_IP_RANGE: "10.3.0.200-10.3.0.210"
  TRUENAS_HOST: "10.2.0.232"
  TRUENAS_ISCSI_PORTAL: "10.2.0.232:3260"
