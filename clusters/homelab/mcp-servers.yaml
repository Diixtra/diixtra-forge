# ══════════════════════════════════════════════════════════════════
# MCP Servers — External GitRepository Source
# ══════════════════════════════════════════════════════════════════
#
# ADR-009: MCP server manifests live in their own repo
# (diixtra-mcp-servers) and are consumed via a second Flux
# GitRepository source. This avoids CI sync pipelines and
# Helm chart packaging overhead.
#
# When custom MCP server images are added later, the same repo
# houses both code and manifests.
# ══════════════════════════════════════════════════════════════════
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: mcp-servers
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Diixtra/diixtra-mcp-servers
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mcp-servers
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: mcp-servers
  path: ./
  prune: true
  wait: true
  dependsOn:
    - name: platform
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
