# ══════════════════════════════════════════════════════════════════
# Cluster Variables — Single Source of Truth
# ══════════════════════════════════════════════════════════════════
#
# LEARNING NOTE — FLUX postBuild.substituteFrom:
#   Flux Kustomizations (capital-K, the Flux CRD) support variable
#   substitution via postBuild. The flow is:
#
#   1. Kustomize builds the overlay (merges base + patches)
#   2. Flux reads this ConfigMap
#   3. Flux replaces every ${VARIABLE} in the rendered output
#   4. Flux applies the substituted YAML to the cluster
#
#   This means the base manifests use ${PLACEHOLDER} syntax, and
#   each cluster overlay provides its own values. The base stays
#   generic, the overlay stays small and readable.
#
#   This is analogous to:
#     - Terraform: terraform.tfvars per environment
#     - Helm: values-production.yaml per environment
#     - Docker Compose: .env file
#     - 12-Factor App: environment variables
#
#   The key insight: variables are defined ONCE per cluster, and
#   every manifest that needs them references the same source.
#   A typo in a vault name gets fixed in ONE place, not twelve.
#
# USAGE IN MANIFESTS:
#   itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_CLOUDFLARE}"
#   host: ${TRUENAS_HOST}
#   email ${ACME_EMAIL}
#
# ══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-vars
  namespace: flux-system
data:
  # ── Domain Configuration ────────────────────────────────────────
  DOMAIN: "kazie.co.uk"
  LAB_DOMAIN: "lab.kazie.co.uk"
  ACME_EMAIL: "james@kazie.co.uk"
  FLUX_GIT_EMAIL: "flux@kazie.co.uk"
  # ── 1Password Configuration ────────────────────────────────────
  # Vault name and item titles must match EXACTLY what's in 1Password.
  # Spaces and capitalisation matter.
  OP_VAULT: "Homelab"
  OP_ITEM_CLOUDFLARE: "cloudflare dns API Credentials"
  OP_ITEM_TRUENAS: "Truenas API Credential"
  OP_ITEM_GRAFANA_CLOUD: "Grafana Cloud API Credentials"
  # ── Network Configuration ──────────────────────────────────────
  METALLB_IP_RANGE: "10.2.0.200-10.2.0.210"
  TRUENAS_HOST: "10.2.0.232"
  TRUENAS_ISCSI_PORTAL: "10.2.0.232:3260"
  # ── External Devices ───────────────────────────────────────────
  HOME_ASSISTANT_HOST: "10.2.20.171"
  # ── GitHub Actions Runner ──────────────────────────────────────
  # URL of the GitHub entity runners will serve.
  # Repo-level: "https://github.com/Diixtra/diixtra-forge"
  # Org-level:  "https://github.com/Diixtra"
  ARC_GITHUB_CONFIG_URL: "https://github.com/Diixtra/diixtra-forge"