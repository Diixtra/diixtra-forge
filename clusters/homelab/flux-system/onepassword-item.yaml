# Slack Webhook URL — synced from 1Password Homelab vault
#
# The Flux slack Provider reads the "address" key from this Secret.
# The 1Password item MUST have a field named "address" containing
# the Slack incoming webhook URL.
#
# NOTE: This file lives in flux-system/ which is applied by the root
# Flux Kustomization (no postBuild substitution). The 1Password vault
# and item names are hardcoded rather than using ${OP_VAULT} variables.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: slack-webhook-url
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: flux-notifications
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/Homelab/items/flux-slack-webhook"
