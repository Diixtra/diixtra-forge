---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/homelab
  prune: true
  wait: true
  # Platform only deploys after infrastructure is fully healthy.
  # This guarantees the 1Password operator is running before Kyverno
  # tries to pull policy configs, and MetalLB is ready before
  # any platform services need LoadBalancer IPs.
  dependsOn:
    - name: infrastructure
