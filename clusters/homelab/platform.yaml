---
# ══════════════════════════════════════════════════════════════════
# Platform Layer — Split into two stages for CRD ordering
# ══════════════════════════════════════════════════════════════════
#
# LEARNING NOTE — WHY TWO KUSTOMIZATIONS:
#   Flux dry-runs ALL resources in a Kustomization before applying
#   any of them. If Kyverno CRDs don't exist yet, dry-running a
#   ClusterPolicy fails the entire batch — even though the
#   HelmRelease that installs those CRDs is in the same batch.
#
#   Solution: split into two stages with dependsOn:
#   1. platform-crds: installs Kyverno + Alloy (HelmReleases bring CRDs)
#   2. platform: installs policies (CRDs now exist, dry-run passes)
#
#   dependsOn works BETWEEN Kustomizations, not between resources
#   within one. This is the ONLY way to express this ordering.
# ══════════════════════════════════════════════════════════════════
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-crds
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/homelab/crds
  prune: true
  # wait: false — only check explicitly listed healthChecks, not all
  # resources. DaemonSets (grafana-alloy, cilium-healthcheck) on
  # unreachable nodes stay Unknown indefinitely; wait: true would
  # block the entire chain.
  # NOTE: on fresh bootstrap the Kyverno HelmRelease may report Ready
  # before the API server discovery cache registers Kyverno CRDs.
  # The platform Kustomization's retryInterval (1m) self-heals this.
  wait: false
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kyverno
      namespace: kyverno-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kube-state-metrics
      namespace: monitoring
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: backstage
      namespace: backstage
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: policy-reporter
      namespace: policy-reporter
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: reloader
      namespace: reloader
  dependsOn:
    - name: infrastructure
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./platform/homelab/policies
  prune: true
  wait: true
  dependsOn:
    - name: platform-crds
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
