---
# Stage 1: CRD Providers
# Deploys operators that register Custom Resource Definitions.
# Must complete before stage 2, which creates resources of those types.
#
# Flux Kustomizations are atomic — if any resource fails server-side
# dry-run, the entire batch is rejected. Separating CRD providers
# from CRD consumers ensures a clean bootstrap from scratch.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-crds
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/homelab/crds
  prune: true
  # wait: false — use explicit healthChecks instead of generic kstatus.
  # wait: true silently ignores healthChecks (Flux docs).
  wait: false
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: onepassword-operator
      namespace: onepassword-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cilium
      namespace: kube-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: crossplane
      namespace: crossplane-system
---
# Stage 2: Crossplane Provider Packages
# Installs Crossplane Provider CRs (pkg.crossplane.io/v1) which download
# provider packages and register provider-specific CRDs (ProviderConfig,
# managed resources). Must complete before stage 3, which creates
# ProviderConfig resources that depend on those CRDs.
#
# Separate stage because:
#   - Provider CRs need the pkg.crossplane.io/v1 CRD from stage 1
#   - ProviderConfig CRs in stage 3 need provider-specific CRDs
#     (e.g. aws.upbound.io/v1beta1) that only exist after the Provider
#     controller starts and registers them
#   - Flux's kstatus cannot reliably detect when provider CRDs are
#     registered, so retryInterval on stage 3 self-heals any race
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-providers
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-crds
  interval: 10m
  retryInterval: 1m
  # 15m to allow 6 provider package downloads on cold bootstrap
  timeout: 15m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/homelab/providers
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
---
# Stage 3: CRD Consumers
# Deploys resources that depend on CRDs installed by earlier stages:
#   - OnePasswordItem (1Password Operator CRD — stage 1)
#   - CiliumLoadBalancerIPPool, CiliumL2AnnouncementPolicy (Cilium — stage 1)
#   - ProviderConfig (Crossplane provider CRDs — stage 2)
#
# Dependency chain:
#   infrastructure-crds → infrastructure-providers → infrastructure
#   → platform-crds → platform → apps
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-providers
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/homelab
  prune: true
  # wait: false — only check explicitly listed healthChecks, not all
  # resources. falco and nvidia-device-plugin can't reach Ready on
  # every node (Pi 5 inotify failure, GPU node absent respectively).
  # wait: true would block the entire reconciliation chain.
  wait: false
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: truenas-nfs
      namespace: democratic-csi
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: truenas-iscsi
      namespace: democratic-csi
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: arc-controller
      namespace: arc-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: traefik
      namespace: traefik-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: arc-runner-set-packer
      namespace: packer-runners
