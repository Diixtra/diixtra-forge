---
# Stage 1: CRD Providers
# Deploys operators and provider packages that register Custom Resource
# Definitions. Must complete before stage 2, which creates resources of
# those types.
#
# This is the same pattern used for platform-crds → platform.
# Flux Kustomizations are atomic — if any resource fails server-side
# dry-run, the entire batch is rejected. Separating CRD providers
# from CRD consumers ensures a clean bootstrap from scratch.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-crds
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/homelab/crds
  prune: true
  wait: true
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: onepassword-operator
      namespace: onepassword-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: cilium
      namespace: kube-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: crossplane
      namespace: crossplane-system
    # Crossplane provider packages — must be healthy (CRDs registered)
    # before infrastructure stage applies ProviderConfig resources.
    - apiVersion: pkg.crossplane.io/v1
      kind: Provider
      name: provider-family-aws
    - apiVersion: pkg.crossplane.io/v1
      kind: Provider
      name: provider-family-gcp
    - apiVersion: pkg.crossplane.io/v1
      kind: Provider
      name: provider-family-azure
    - apiVersion: pkg.crossplane.io/v1
      kind: Provider
      name: provider-oci
    - apiVersion: pkg.crossplane.io/v1
      kind: Provider
      name: provider-terraform-neon
    - apiVersion: pkg.crossplane.io/v1
      kind: Provider
      name: provider-terraform-supabase
---
# Stage 2: CRD Consumers
# Deploys resources that depend on CRDs installed by infrastructure-crds:
#   - OnePasswordItem (1Password Operator CRD)
#   - CiliumLoadBalancerIPPool, CiliumL2AnnouncementPolicy (Cilium CRDs)
#   - ProviderConfig (Crossplane provider CRDs)
#
# Dependency chain: infrastructure-crds → infrastructure → platform-crds → platform → apps
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-crds
  interval: 10m
  retryInterval: 1m
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/homelab
  prune: true
  # wait: false — only check explicitly listed healthChecks, not all
  # resources. falco and nvidia-device-plugin can't reach Ready on
  # every node (Pi 5 inotify failure, GPU node absent respectively).
  # wait: true would block the entire reconciliation chain.
  wait: false
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: truenas-nfs
      namespace: democratic-csi
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: truenas-iscsi
      namespace: democratic-csi
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: arc-controller
      namespace: arc-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: traefik
      namespace: traefik-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: arc-runner-set-packer
      namespace: packer-runners
