# ══════════════════════════════════════════════════════════════════
# MCP Servers — External GitRepository Source (Dev)
# ══════════════════════════════════════════════════════════════════
# See clusters/homelab/mcp-servers.yaml for detailed comments.
# ══════════════════════════════════════════════════════════════════
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: mcp-servers
  namespace: flux-system
spec:
  interval: 5m
  url: https://github.com/Diixtra/diixtra-mcp-servers
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: mcp-servers
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: mcp-servers
  path: ./
  prune: true
  wait: true
  dependsOn:
    - name: platform
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-vars
