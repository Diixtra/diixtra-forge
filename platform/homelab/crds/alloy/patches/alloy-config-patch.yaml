apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-alloy
  namespace: monitoring
spec:
  values:
    # hostNetwork required for scraping etcd metrics on localhost:2381.
    # etcd only listens on 127.0.0.1, so Alloy must share the host
    # network namespace to reach it.
    controller:
      hostNetwork: true
    alloy:
      clustering:
        enabled: true
      mounts:
        varlog: true
      configMap:
        content: |
          // ════════════════════════════════════════════════════════════
          // Grafana Cloud API Key (from 1Password)
          // ════════════════════════════════════════════════════════════
          remote.kubernetes.secret "grafana_cloud" {
            name      = "grafana-cloud-credentials"
            namespace = "monitoring"
          }

          // ════════════════════════════════════════════════════════════
          // Sinks — Prometheus Remote Write & Loki
          // ════════════════════════════════════════════════════════════
          // URLs and usernames are Flux-substituted from cluster vars.
          // Only the API key comes from the 1Password secret.
          prometheus.remote_write "grafana_cloud" {
            endpoint {
              url = "${GRAFANA_PROMETHEUS_URL}"
              basic_auth {
                username = "${GRAFANA_PROMETHEUS_USERNAME}"
                password = remote.kubernetes.secret.grafana_cloud.data["credential"]
              }
            }
            external_labels = {
              cluster = "homelab",
            }
          }

          loki.write "grafana_cloud" {
            endpoint {
              url = "${GRAFANA_LOKI_URL}"
              basic_auth {
                username = "${GRAFANA_LOKI_USERNAME}"
                password = remote.kubernetes.secret.grafana_cloud.data["credential"]
              }
            }
            external_labels = {
              cluster = "homelab",
            }
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — Kubelet (per-node)
          // Only keep essential kubelet metrics. The default /metrics endpoint
          // exposes ~400 series per node including Go runtime, gRPC, and
          // storage operation histograms that we don't dashboard or alert on.
          // ════════════════════════════════════════════════════════════
          prometheus.relabel "kubelet_filter" {
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]

            // Keep only kubelet operational metrics we actually use
            rule {
              source_labels = ["__name__"]
              regex         = "kubelet_running_pods|kubelet_running_containers|kubelet_node_name|kubelet_volume_stats_.*|kubelet_pod_start_duration_seconds_count|up"
              action        = "keep"
            }
          }

          prometheus.scrape "kubelet" {
            targets = [{
              __address__ = env("HOSTNAME") + ":10250",
            }]
            scheme     = "https"
            bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            tls_config {
              insecure_skip_verify = true
            }
            scrape_interval = "60s"
            forward_to      = [prometheus.relabel.kubelet_filter.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — cAdvisor (per-node)
          // Drop high-cardinality filesystem & network metrics to reduce
          // Grafana Cloud ingestion. Keep CPU, memory, and fs usage/limit metrics.
          // Note: restart counts come from kube-state-metrics, not cAdvisor.
          // ════════════════════════════════════════════════════════════
          prometheus.relabel "cadvisor_filter" {
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]

            // Drop noisy high-cardinality I/O, network, and lifecycle metrics.
            // DiskPressure alerting uses kube_node_status_condition from KSM,
            // not cAdvisor fs metrics. CPU/memory/fs usage metrics are kept
            // for dashboards.

            // Drop noisy filesystem I/O counters (per-device, per-mountpoint)
            rule {
              source_labels = ["__name__"]
              regex         = "container_fs_(reads|writes|read_bytes|write_bytes|io_current|io_time)_total"
              action        = "drop"
            }
            // Drop per-interface network metrics (high cardinality per pod)
            rule {
              source_labels = ["__name__"]
              regex         = "container_network_(receive|transmit)_(packets|errors)_total"
              action        = "drop"
            }
            // Drop task-state metrics (rarely useful)
            rule {
              source_labels = ["__name__"]
              regex         = "container_tasks_state"
              action        = "drop"
            }
            // Drop per-interface network byte counters (high cardinality)
            rule {
              source_labels = ["__name__"]
              regex         = "container_network_(receive|transmit)_bytes_total"
              action        = "drop"
            }
            // Drop container spec metrics (static, rarely change)
            rule {
              source_labels = ["__name__"]
              regex         = "container_spec_.*"
              action        = "drop"
            }
            // Drop container start/last-seen timestamps (not useful for dashboards)
            rule {
              source_labels = ["__name__"]
              regex         = "container_(start_time_seconds|last_seen)"
              action        = "drop"
            }
          }

          prometheus.scrape "cadvisor" {
            targets = [{
              __address__ = env("HOSTNAME") + ":10250",
            }]
            metrics_path = "/metrics/cadvisor"
            scheme       = "https"
            bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            tls_config {
              insecure_skip_verify = true
            }
            scrape_interval = "60s"
            forward_to      = [prometheus.relabel.cadvisor_filter.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — kube-state-metrics (cluster-wide)
          // KSM collectors are already restricted in the HelmRelease values.
          // This relabel pass drops the remaining high-cardinality series
          // we don't need: labels/annotations hashes, owner references,
          // and status reason/message strings that explode cardinality.
          // ════════════════════════════════════════════════════════════
          prometheus.relabel "ksm_filter" {
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]

            // Drop label and annotation metrics (one series per unique label combo)
            rule {
              source_labels = ["__name__"]
              regex         = "kube_(pod|node|deployment|statefulset|daemonset|namespace)_labels|kube_pod_info|kube_pod_owner"
              action        = "drop"
            }
            // Drop status reason/message metrics (high cardinality strings)
            rule {
              source_labels = ["__name__"]
              regex         = "kube_pod_status_reason|kube_pod_container_status_last_terminated_reason"
              action        = "drop"
            }
          }

          prometheus.scrape "kube_state_metrics" {
            targets = [{
              __address__ = "kube-state-metrics.monitoring.svc.cluster.local:8080",
            }]
            scrape_interval = "60s"
            clustering {
              enabled = true
            }
            forward_to = [prometheus.relabel.ksm_filter.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — TrueNAS (via graphite-exporter)
          // ════════════════════════════════════════════════════════════
          // TrueNAS pushes Graphite plaintext to graphite-exporter:9109.
          // The exporter converts to Prometheus format on :9108/metrics.
          // TrueNAS exports hundreds of per-disk, per-interface, per-dataset
          // series. Only keep the ones we actually dashboard: pool usage,
          // disk temperature, CPU, memory, and network throughput.
          prometheus.relabel "truenas_filter" {
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]

            // Keep only the TrueNAS metrics we dashboard on
            rule {
              source_labels = ["__name__"]
              regex         = "graphite_exporter_.*|truenas_pool.*|truenas_disk_temperature.*|truenas_cpu.*|truenas_memory.*|truenas_network_(sent|received)_bytes.*|truenas_dataset_(used|available)_bytes.*|up"
              action        = "keep"
            }
          }

          prometheus.scrape "truenas" {
            targets = [{
              __address__ = "graphite-exporter.monitoring.svc.cluster.local:9108",
            }]
            scrape_interval = "60s"
            clustering {
              enabled = true
            }
            forward_to = [prometheus.relabel.truenas_filter.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Logs — Pod logs (excludes system namespaces)
          // Reduces Loki ingestion by skipping noisy infrastructure logs
          // that are rarely needed for application debugging.
          // ════════════════════════════════════════════════════════════
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets

            // Drop system namespaces — these generate high log volume
            // with limited debugging value for application teams
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              regex         = "kube-system|kube-public|kube-node-lease|flux-system"
              action        = "drop"
            }
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
          }

          loki.source.kubernetes "pod_logs" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.write.grafana_cloud.receiver]
            clustering {
              enabled = true
            }
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — etcd (control plane node only)
          // ════════════════════════════════════════════════════════════
          // etcd exposes metrics on http://127.0.0.1:2381/metrics (kubeadm default).
          // Requires hostNetwork on the Alloy DaemonSet to reach localhost.
          // On worker nodes this scrape fails silently (up=0) — expected
          // since only the control plane runs etcd.
          //
          // Keeplist: only retain the metrics needed for alerting to
          // minimise Grafana Cloud series count.
          prometheus.relabel "etcd_filter" {
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]

            rule {
              source_labels = ["__name__"]
              regex         = "etcd_disk_wal_fsync_duration_seconds_bucket|etcd_disk_wal_fsync_duration_seconds_count|etcd_disk_wal_fsync_duration_seconds_sum|etcd_mvcc_db_total_size_in_bytes|etcd_server_quota_backend_bytes|up"
              action        = "keep"
            }
          }

          prometheus.scrape "etcd" {
            targets = [{
              __address__ = "127.0.0.1:2381",
            }]
            scrape_interval = "60s"
            job_name        = "etcd"
            forward_to      = [prometheus.relabel.etcd_filter.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Alerting — Sync PrometheusRule CRDs to Grafana Cloud
          // ════════════════════════════════════════════════════════════
          // Watches for PrometheusRule resources in the cluster and syncs
          // them to Grafana Cloud's Mimir ruler for evaluation. Rules are
          // defined as GitOps-managed CRDs in platform/base/alerting/rules/.
          //
          // Grafana Cloud evaluates rules and routes alerts via its
          // built-in Alertmanager to the Slack contact point configured
          // in the Grafana Cloud UI.
          mimir.rules.kubernetes "grafana_cloud" {
            address = "${GRAFANA_MIMIR_URL}"
            tenant_id = "${GRAFANA_PROMETHEUS_USERNAME}"

            basic_auth {
              username = "${GRAFANA_PROMETHEUS_USERNAME}"
              password = remote.kubernetes.secret.grafana_cloud.data["credential"]
            }
          }
