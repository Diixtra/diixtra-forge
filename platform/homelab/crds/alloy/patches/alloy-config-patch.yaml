apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: grafana-alloy
  namespace: monitoring
spec:
  values:
    alloy:
      clustering:
        enabled: true
      mounts:
        varlog: true
      configMap:
        content: |
          // ════════════════════════════════════════════════════════════
          // Grafana Cloud Credentials
          // ════════════════════════════════════════════════════════════
          remote.kubernetes.secret "grafana_cloud" {
            name      = "grafana-cloud-credentials"
            namespace = "monitoring"
          }

          // ════════════════════════════════════════════════════════════
          // Sinks — Prometheus Remote Write & Loki
          // ════════════════════════════════════════════════════════════
          prometheus.remote_write "grafana_cloud" {
            endpoint {
              url = nonsensitive(remote.kubernetes.secret.grafana_cloud.data["prometheus-url"])
              basic_auth {
                username = nonsensitive(remote.kubernetes.secret.grafana_cloud.data["prometheus-username"])
                password = remote.kubernetes.secret.grafana_cloud.data["api-key"]
              }
            }
            external_labels = {
              cluster = "homelab",
            }
          }

          loki.write "grafana_cloud" {
            endpoint {
              url = nonsensitive(remote.kubernetes.secret.grafana_cloud.data["loki-url"])
              basic_auth {
                username = nonsensitive(remote.kubernetes.secret.grafana_cloud.data["loki-username"])
                password = remote.kubernetes.secret.grafana_cloud.data["api-key"]
              }
            }
            external_labels = {
              cluster = "homelab",
            }
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — Kubelet (per-node)
          // ════════════════════════════════════════════════════════════
          prometheus.scrape "kubelet" {
            targets = [{
              __address__ = env("HOSTNAME") + ":10250",
            }]
            scheme     = "https"
            bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            tls_config {
              insecure_skip_verify = true
            }
            scrape_interval = "60s"
            forward_to      = [prometheus.remote_write.grafana_cloud.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — cAdvisor (per-node)
          // ════════════════════════════════════════════════════════════
          prometheus.scrape "cadvisor" {
            targets = [{
              __address__ = env("HOSTNAME") + ":10250",
            }]
            metrics_path = "/metrics/cadvisor"
            scheme       = "https"
            bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
            tls_config {
              insecure_skip_verify = true
            }
            scrape_interval = "60s"
            forward_to      = [prometheus.remote_write.grafana_cloud.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — kube-state-metrics (cluster-wide)
          // ════════════════════════════════════════════════════════════
          prometheus.scrape "kube_state_metrics" {
            targets = [{
              __address__ = "kube-state-metrics.monitoring.svc.cluster.local:8080",
            }]
            scrape_interval = "60s"
            clustering {
              enabled = true
            }
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Metrics — TrueNAS (external)
          // ════════════════════════════════════════════════════════════
          prometheus.scrape "truenas" {
            targets = [{
              __address__ = "${TRUENAS_HOST}:9273",
            }]
            scrape_interval = "60s"
            clustering {
              enabled = true
            }
            forward_to = [prometheus.remote_write.grafana_cloud.receiver]
          }

          // ════════════════════════════════════════════════════════════
          // Logs — All pod logs via Kubernetes discovery
          // ════════════════════════════════════════════════════════════
          discovery.kubernetes "pods" {
            role = "pod"
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets

            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
          }

          loki.source.kubernetes "pod_logs" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.write.grafana_cloud.receiver]
            clustering {
              enabled = true
            }
          }
