# Flux Alert — Error Events from All Flux Sources
#
# Watches HelmRelease, Kustomization, GitRepository, and HelmRepository
# objects for error events. HelmReleases live in their workload
# namespaces, so each namespace must be listed explicitly — the Flux
# Alert CRD does not support namespace wildcards.
#
# Kustomization, GitRepository, and HelmRepository objects all live
# in flux-system, so omitting namespace defaults correctly.
#
# When adding a new HelmRelease in a new namespace, add an entry here.
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: flux-system-errors
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: flux-notifications
    app.kubernetes.io/managed-by: flux
spec:
  providerRef:
    name: slack-flux-alerts
  eventSeverity: error
  eventSources:
    # ── HelmReleases (one entry per namespace) ──────────────────────
    - kind: HelmRelease
      name: "*"
      namespace: arc-runners
    - kind: HelmRelease
      name: "*"
      namespace: arc-system
    - kind: HelmRelease
      name: "*"
      namespace: backstage
    - kind: HelmRelease
      name: "*"
      namespace: crossplane-system
    - kind: HelmRelease
      name: "*"
      namespace: democratic-csi
    - kind: HelmRelease
      name: "*"
      namespace: falco-system
    - kind: HelmRelease
      name: "*"
      namespace: flux-system
    - kind: HelmRelease
      name: "*"
      namespace: jupyterhub
    - kind: HelmRelease
      name: "*"
      namespace: kube-system
    - kind: HelmRelease
      name: "*"
      namespace: kyverno-system
    - kind: HelmRelease
      name: "*"
      namespace: monitoring
    - kind: HelmRelease
      name: "*"
      namespace: nvidia-device-plugin
    - kind: HelmRelease
      name: "*"
      namespace: ollama
    - kind: HelmRelease
      name: "*"
      namespace: onepassword-system
    - kind: HelmRelease
      name: "*"
      namespace: packer-runners
    - kind: HelmRelease
      name: "*"
      namespace: policy-reporter
    - kind: HelmRelease
      name: "*"
      namespace: reloader
    - kind: HelmRelease
      name: "*"
      namespace: traefik-system
    # ── Flux system resources (all in flux-system) ─────────────────
    - kind: Kustomization
      name: "*"
    - kind: GitRepository
      name: "*"
    - kind: HelmRepository
      name: "*"
