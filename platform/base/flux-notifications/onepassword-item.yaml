# Slack Webhook URL — synced from 1Password ${OP_VAULT} vault
#
# The Flux slack Provider reads the "address" key from this Secret.
# The 1Password item MUST have a field named "address" containing
# the Slack incoming webhook URL.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: slack-webhook-url
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: flux-notifications
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_SLACK_WEBHOOK}"
