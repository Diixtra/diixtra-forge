# Komoplane — Crossplane resource visualisation and troubleshooting UI
# https://github.com/komodorio/komoplane
#
# Deployed into crossplane-system alongside the Crossplane controller.
# Exposed via Traefik at crossplane.${LAB_DOMAIN} with basic auth.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: komoplane
  namespace: crossplane-system
spec:
  interval: 30m
  chart:
    spec:
      chart: komoplane
      version: "*" # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: komodorio
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  values:
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: true
