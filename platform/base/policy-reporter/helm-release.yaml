apiVersion: v1
kind: Namespace
metadata:
  name: policy-reporter
  labels:
    app.kubernetes.io/managed-by: flux
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: policy-reporter
spec:
  interval: 30m
  chart:
    spec:
      chart: policy-reporter
      version: "*"          # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
  upgrade:
    timeout: 10m
  values:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
    ui:
      enabled: false    # We use Backstage, not the built-in UI
    rest:
      enabled: true     # REST API for the Backstage plugin
