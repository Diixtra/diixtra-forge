apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: test-traefik-dashboard
  namespace: traefik-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`test-traefik.${LAB_DOMAIN}`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService
      middlewares:
        - name: security-headers
        - name: dashboard-auth
  tls:
    certResolver: letsencrypt
