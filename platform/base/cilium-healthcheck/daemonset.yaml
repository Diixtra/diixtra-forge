# ══════════════════════════════════════════════════════════════════
# Cilium ClusterIP Health Check DaemonSet
# ══════════════════════════════════════════════════════════════════
# Detects stale Cilium eBPF service maps that survive control plane
# outages. After a crash, existing pods retain working connections
# but NEW pods can't route to ClusterIPs (EHOSTUNREACH). This is
# invisible to standard Kubernetes health checks — nodes show Ready,
# Cilium pods show Running, but pod-to-service networking is broken.
#
# The check runs on every node, tests ClusterIP and DNS connectivity,
# and restarts the local Cilium agent if both fail persistently.
# ══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cilium-healthcheck
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cilium-healthcheck
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cilium-healthcheck
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cilium-healthcheck
        app.kubernetes.io/managed-by: flux
    spec:
      serviceAccountName: cilium-healthcheck
      tolerations:
        - operator: Exists
      containers:
        - name: healthcheck
          image: registry.k8s.io/kubectl:v1.35.1
          command:
            - /bin/bash
            - -c
            - |
              set -uo pipefail

              CHECK_INTERVAL=60
              COOLDOWN_AFTER_RESTART=300
              RETRY_COUNT=3
              RETRY_DELAY=10

              log() { echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') $*"; }

              test_clusterip() {
                timeout 5 bash -c "echo > /dev/tcp/${KUBERNETES_SERVICE_HOST}/${KUBERNETES_SERVICE_PORT}" 2>/dev/null
              }

              test_dns() {
                nslookup kubernetes.default.svc.cluster.local 2>/dev/null | grep -q "Address"
              }

              log "Starting cilium-healthcheck on node ${NODE_NAME}"
              log "Check interval: ${CHECK_INTERVAL}s, retries: ${RETRY_COUNT}, cooldown: ${COOLDOWN_AFTER_RESTART}s"

              while true; do
                sleep "${CHECK_INTERVAL}"

                # Quick check — if either passes, networking is fine
                if test_clusterip || test_dns; then
                  continue
                fi

                # Both failed — could be transient. Retry before acting.
                log "WARN: ClusterIP and DNS both unreachable, retrying ${RETRY_COUNT} times..."
                CONFIRMED_FAILURE=true

                for i in $(seq 1 "${RETRY_COUNT}"); do
                  sleep "${RETRY_DELAY}"
                  if test_clusterip || test_dns; then
                    log "Retry ${i}/${RETRY_COUNT}: connectivity restored, false alarm"
                    CONFIRMED_FAILURE=false
                    break
                  fi
                  log "Retry ${i}/${RETRY_COUNT}: still failing"
                done

                if [ "${CONFIRMED_FAILURE}" = "false" ]; then
                  continue
                fi

                # Persistent failure — restart Cilium agent on this node
                log "ERROR: ClusterIP routing broken on ${NODE_NAME} after ${RETRY_COUNT} retries"

                CILIUM_POD=$(kubectl get pods -n kube-system -l k8s-app=cilium \
                  --field-selector "spec.nodeName=${NODE_NAME}" \
                  -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

                if [ -z "${CILIUM_POD}" ]; then
                  log "ERROR: Could not find Cilium agent pod on ${NODE_NAME}"
                  sleep "${COOLDOWN_AFTER_RESTART}"
                  continue
                fi

                log "Deleting Cilium agent ${CILIUM_POD} to rebuild eBPF maps..."
                if kubectl delete pod -n kube-system "${CILIUM_POD}" --grace-period=30; then
                  log "Cilium agent deleted. DaemonSet will recreate it."
                else
                  log "ERROR: Failed to delete Cilium agent ${CILIUM_POD}"
                fi

                log "Cooldown: sleeping ${COOLDOWN_AFTER_RESTART}s before next check"
                sleep "${COOLDOWN_AFTER_RESTART}"
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cilium-healthcheck
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cilium-healthcheck
    app.kubernetes.io/managed-by: flux
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cilium-healthcheck
  labels:
    app.kubernetes.io/name: cilium-healthcheck
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cilium-healthcheck
  labels:
    app.kubernetes.io/name: cilium-healthcheck
    app.kubernetes.io/managed-by: flux
subjects:
  - kind: ServiceAccount
    name: cilium-healthcheck
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: cilium-healthcheck
  apiGroup: rbac.authorization.k8s.io
