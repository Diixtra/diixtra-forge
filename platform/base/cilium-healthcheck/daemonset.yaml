# ══════════════════════════════════════════════════════════════════
# Cilium ClusterIP Health Check DaemonSet
# ══════════════════════════════════════════════════════════════════
# Detects stale Cilium eBPF service maps that survive control plane
# outages. After a crash, existing pods retain working connections
# but NEW pods can't route to ClusterIPs (EHOSTUNREACH). This is
# invisible to standard Kubernetes health checks — nodes show Ready,
# Cilium pods show Running, but pod-to-service networking is broken.
#
# The check runs on every node, tests ClusterIP connectivity and DNS
# resolution via kubectl (which uses the mounted SA token and CA),
# and deletes the local Cilium agent pod if both fail persistently
# (the DaemonSet controller recreates it, rebuilding the eBPF maps).
# ══════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cilium-healthcheck
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cilium-healthcheck
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: cilium-healthcheck
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cilium-healthcheck
        app.kubernetes.io/managed-by: flux
    spec:
      serviceAccountName: cilium-healthcheck
      tolerations:
        - operator: Exists
      containers:
        - name: healthcheck
          image: registry.k8s.io/kubectl:v1.35.1
          command:
            - /bin/sh
            - -c
            - |
              # No -e: loop must survive individual check failures
              set -u

              CHECK_INTERVAL=60
              COOLDOWN_AFTER_RESTART=300
              RETRY_COUNT=3
              RETRY_DELAY=10
              MAX_RESTARTS=3
              RESTART_WINDOW=3600

              RESTART_COUNT=0
              RESTART_WINDOW_START=$(date +%s)
              CHECKS=0

              log() { echo "$(date -u '+%Y-%m-%dT%H:%M:%SZ') $*"; }

              trap 'log "Received signal, shutting down"; exit 0' TERM INT

              # Uses kubectl with mounted SA token and CA — handles TLS and auth.
              test_clusterip() {
                timeout 5 kubectl get --raw /livez >/dev/null 2>&1
              }

              # Forces DNS resolution by using the FQDN via --server flag.
              test_dns() {
                timeout 5 kubectl get --raw /livez \
                  --server="https://kubernetes.default.svc.cluster.local:443" >/dev/null 2>&1
              }

              # Validate prerequisites
              if [ -z "${KUBERNETES_SERVICE_HOST:-}" ] || [ -z "${KUBERNETES_SERVICE_PORT:-}" ]; then
                log "FATAL: KUBERNETES_SERVICE_HOST or KUBERNETES_SERVICE_PORT not set"
                exit 1
              fi
              if [ -z "${NODE_NAME:-}" ]; then
                log "FATAL: NODE_NAME not set"
                exit 1
              fi

              log "Starting cilium-healthcheck on node ${NODE_NAME}"
              log "Check interval: ${CHECK_INTERVAL}s, retries: ${RETRY_COUNT}, cooldown: ${COOLDOWN_AFTER_RESTART}s, max restarts: ${MAX_RESTARTS}/hour"

              while true; do
                sleep "${CHECK_INTERVAL}" &
                wait $!
                CHECKS=$((CHECKS + 1))
                touch /tmp/healthcheck-alive

                # Quick check — if either passes, networking is fine
                if test_clusterip || test_dns; then
                  if [ $((CHECKS % 10)) -eq 0 ]; then
                    log "OK: ${CHECKS} checks completed, connectivity healthy on ${NODE_NAME}"
                  fi
                  continue
                fi

                # Both failed — could be transient. Retry before acting.
                log "WARN: ClusterIP and DNS both unreachable, retrying ${RETRY_COUNT} times..."
                CONFIRMED_FAILURE=true

                i=1
                while [ "$i" -le "${RETRY_COUNT}" ]; do
                  sleep "${RETRY_DELAY}" &
                  wait $!
                  if test_clusterip || test_dns; then
                    log "Retry ${i}/${RETRY_COUNT}: connectivity restored, false alarm"
                    CONFIRMED_FAILURE=false
                    break
                  fi
                  log "Retry ${i}/${RETRY_COUNT}: still failing"
                  i=$((i + 1))
                done

                if [ "${CONFIRMED_FAILURE}" = "false" ]; then
                  continue
                fi

                # Log probe details on confirmed failure for diagnostics
                CLUSTERIP_ERR=$(timeout 5 kubectl get --raw /livez 2>&1) || true
                DNS_ERR=$(timeout 5 kubectl get --raw /livez \
                  --server="https://kubernetes.default.svc.cluster.local:443" 2>&1) || true
                log "ERROR: ClusterIP routing broken on ${NODE_NAME} after ${RETRY_COUNT} retries"
                log "  ClusterIP probe: ${CLUSTERIP_ERR}"
                log "  DNS probe: ${DNS_ERR}"

                # Rate limit restarts to prevent infinite restart loops
                NOW=$(date +%s)
                ELAPSED=$((NOW - RESTART_WINDOW_START))
                if [ "${ELAPSED}" -gt "${RESTART_WINDOW}" ]; then
                  RESTART_COUNT=0
                  RESTART_WINDOW_START=${NOW}
                fi
                if [ "${RESTART_COUNT}" -ge "${MAX_RESTARTS}" ]; then
                  log "ERROR: Already restarted Cilium ${RESTART_COUNT} times in the last ${ELAPSED}s. Manual intervention required on ${NODE_NAME}."
                  sleep "${COOLDOWN_AFTER_RESTART}" &
                  wait $!
                  continue
                fi

                # Find the Cilium agent pod on this node (separate stdout/stderr)
                CILIUM_POD=$(timeout 30 kubectl get pods -n kube-system -l k8s-app=cilium \
                  --field-selector "spec.nodeName=${NODE_NAME}" \
                  -o jsonpath='{.items[0].metadata.name}' 2>/tmp/kubectl-stderr)
                KUBECTL_RC=$?
                if [ "${KUBECTL_RC}" -ne 0 ]; then
                  KUBECTL_ERR=$(cat /tmp/kubectl-stderr 2>/dev/null)
                  log "ERROR: kubectl failed (rc=${KUBECTL_RC}) on ${NODE_NAME}: ${KUBECTL_ERR}"
                  sleep "${CHECK_INTERVAL}" &
                  wait $!
                  continue
                fi
                if [ -z "${CILIUM_POD}" ]; then
                  log "ERROR: No Cilium agent pod found on ${NODE_NAME} (label k8s-app=cilium)"
                  sleep "${CHECK_INTERVAL}" &
                  wait $!
                  continue
                fi
                # Guard against kubectl warnings polluting the pod name
                case "${CILIUM_POD}" in
                  *[[:space:]]*)
                    log "ERROR: Unexpected kubectl output on ${NODE_NAME}: ${CILIUM_POD}"
                    sleep "${CHECK_INTERVAL}" &
                    wait $!
                    continue
                    ;;
                esac

                log "Deleting Cilium agent ${CILIUM_POD} to rebuild eBPF maps..."
                DELETE_OUTPUT=$(timeout 60 kubectl delete pod -n kube-system "${CILIUM_POD}" --grace-period=30 2>&1)
                DELETE_RC=$?
                if [ "${DELETE_RC}" -ne 0 ]; then
                  log "ERROR: Failed to delete Cilium agent ${CILIUM_POD} (rc=${DELETE_RC}): ${DELETE_OUTPUT}"
                  sleep "${CHECK_INTERVAL}" &
                  wait $!
                  continue
                fi

                RESTART_COUNT=$((RESTART_COUNT + 1))
                log "Cilium agent ${CILIUM_POD} deleted (${RESTART_COUNT}/${MAX_RESTARTS} in window). DaemonSet will recreate it."

                log "Cooldown: sleeping ${COOLDOWN_AFTER_RESTART}s before next check"
                sleep "${COOLDOWN_AFTER_RESTART}" &
                wait $!

                # Post-restart validation
                if test_clusterip || test_dns; then
                  log "Post-restart: connectivity restored on ${NODE_NAME}"
                else
                  log "WARN: Post-restart: connectivity still broken on ${NODE_NAME}"
                fi
              done
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - '[ $(($(date +%s) - $(stat -c %Y /tmp/healthcheck-alive 2>/dev/null || echo 0))) -lt 300 ]'
            initialDelaySeconds: 120
            periodSeconds: 60
            failureThreshold: 3
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Mi
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cilium-healthcheck
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cilium-healthcheck
    app.kubernetes.io/managed-by: flux
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cilium-healthcheck
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cilium-healthcheck
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cilium-healthcheck
  namespace: kube-system
  labels:
    app.kubernetes.io/name: cilium-healthcheck
    app.kubernetes.io/managed-by: flux
subjects:
  - kind: ServiceAccount
    name: cilium-healthcheck
    namespace: kube-system
roleRef:
  kind: Role
  name: cilium-healthcheck
  apiGroup: rbac.authorization.k8s.io
