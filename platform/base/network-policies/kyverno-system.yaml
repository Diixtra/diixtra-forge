# ══════════════════════════════════════════════════════════════════
# kyverno-system — Policy Engine
#
# Kyverno enforces cluster policies via admission webhooks. The
# Kubernetes API server calls Kyverno's webhook endpoints when
# resources are created/modified, so Kyverno needs ingress from
# the API server. Kyverno also needs egress to the API server to
# watch policy resources and generate reports.
# ══════════════════════════════════════════════════════════════════
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kyverno-system-default-deny
  namespace: kyverno-system
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kyverno-system-allow-ingress-kube-api
  namespace: kyverno-system
spec:
  endpointSelector: {}
  ingress:
    - fromEntities:
        - kube-apiserver
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kyverno-system-allow-egress-kube-api
  namespace: kyverno-system
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
