# ══════════════════════════════════════════════════════════════════
# crossplane-system — Universal Control Plane
#
# Crossplane reconciles cloud resources via provider CRDs. The
# controller watches the Kubernetes API for managed resources and
# calls external cloud provider APIs to provision them.
# ══════════════════════════════════════════════════════════════════
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: crossplane-system-default-deny
  namespace: crossplane-system
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: crossplane-system-allow-egress-kube-api
  namespace: crossplane-system
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
---
# Crossplane needs HTTPS egress to cloud provider APIs and package registries
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: crossplane-system-allow-egress-providers
  namespace: crossplane-system
spec:
  endpointSelector: {}
  egress:
    - toFQDNs:
        - matchName: xpkg.upbound.io
        - matchPattern: "*.xpkg.upbound.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
