# ══════════════════════════════════════════════════════════════════
# reloader — ConfigMap/Secret Change Watcher
#
# Reloader watches for changes to ConfigMaps and Secrets and
# triggers rolling restarts of dependent workloads. It only needs
# egress to the Kubernetes API to watch resources and patch
# Deployments/StatefulSets/DaemonSets.
# ══════════════════════════════════════════════════════════════════
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: reloader-default-deny
  namespace: reloader
spec:
  endpointSelector: {}
  # Explicit ingress deny — reloader has no inbound connections.
  # ingressDeny takes precedence over ingress allow rules; safe here
  # because no ingress allow policies exist for this namespace.
  ingressDeny:
    - fromEntities:
        - all
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: reloader-allow-egress-kube-api
  namespace: reloader
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
