# ══════════════════════════════════════════════════════════════════
# onepassword-system — 1Password Operator
#
# The 1Password Connect operator syncs secrets from 1Password
# vaults into Kubernetes Secrets. It needs egress to 1Password's
# cloud APIs and the Kubernetes API (to create/update Secret
# objects from OnePasswordItem CRs).
# ══════════════════════════════════════════════════════════════════
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: onepassword-system-default-deny
  namespace: onepassword-system
spec:
  endpointSelector: {}
  # Explicit ingress deny — onepassword-system has no inbound connections.
  # ingressDeny takes precedence over ingress allow rules; safe here
  # because no ingress allow policies exist for this namespace.
  ingressDeny:
    - fromEntities:
        - all
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: onepassword-system-allow-egress-1password
  namespace: onepassword-system
spec:
  endpointSelector: {}
  egress:
    - toFQDNs:
        - matchPattern: "*.1password.com"
        - matchPattern: "*.b5dev.com"    # 1Password Connect infrastructure domain
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: onepassword-system-allow-egress-kube-api
  namespace: onepassword-system
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
