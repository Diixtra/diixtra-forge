# ══════════════════════════════════════════════════════════════════
# packer-runners — Packer Build Runners
#
# HIGH RISK — These pods run Packer builds which may download ISOs,
# call Proxmox APIs, and execute arbitrary build scripts. Network
# access is restricted to GitHub for workflow communication and
# the Kubernetes API.
# ══════════════════════════════════════════════════════════════════
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: packer-runners-default-deny
  namespace: packer-runners
spec:
  endpointSelector: {}
  ingress: []
  egress: []
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: packer-runners-allow-egress-github
  namespace: packer-runners
spec:
  endpointSelector: {}
  egress:
    - toFQDNs:
        - matchName: github.com
        - matchName: api.github.com
        - matchPattern: "*.githubusercontent.com"
        - matchName: ghcr.io
        - matchPattern: "*.ghcr.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: packer-runners-allow-egress-kube-api
  namespace: packer-runners
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
