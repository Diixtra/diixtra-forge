# ══════════════════════════════════════════════════════════════════
# arc-runners — GitHub Actions Runner Controller
#
# HIGH RISK — These pods execute arbitrary CI/CD workflows from
# GitHub Actions. Network access is locked down tightly to only
# what is needed: GitHub/GHCR for workflow communication and image
# pulls, and the Kubernetes API for Flux status checks.
# ══════════════════════════════════════════════════════════════════
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arc-runners-default-deny
  namespace: arc-runners
spec:
  endpointSelector: {}
  # Explicit ingress deny — arc-runners has no inbound connections.
  # ingressDeny takes precedence over ingress allow rules; safe here
  # because no ingress allow policies exist for this namespace.
  ingressDeny:
    - fromEntities:
        - all
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arc-runners-allow-egress-github
  namespace: arc-runners
spec:
  endpointSelector: {}
  egress:
    - toFQDNs:
        - matchName: github.com
        - matchName: api.github.com
        - matchPattern: "*.githubusercontent.com"
        - matchName: ghcr.io
        - matchPattern: "*.ghcr.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
# Workflow steps download CLI tools at runtime (kubectl from dl.k8s.io,
# Flux CLI from fluxcd.io). dl.k8s.io redirects to storage.googleapis.com.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arc-runners-allow-egress-cli-downloads
  namespace: arc-runners
spec:
  endpointSelector: {}
  egress:
    - toFQDNs:
        - matchName: dl.k8s.io
        - matchPattern: "*.dl.k8s.io"
        - matchName: storage.googleapis.com
        - matchName: fluxcd.io
        - matchPattern: "*.fluxcd.io"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: arc-runners-allow-egress-kube-api
  namespace: arc-runners
spec:
  endpointSelector: {}
  egress:
    - toEntities:
        - kube-apiserver
