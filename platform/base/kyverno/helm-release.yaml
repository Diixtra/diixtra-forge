apiVersion: v1
kind: Namespace
metadata:
  name: kyverno-system
  labels:
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/managed-by: flux
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      version: "*"          # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 1h
  # ── Timeouts ──────────────────────────────────────────────────
  # LEARNING NOTE — WHY 10m:
  #   Kyverno installs 69 resources (4 controllers, CRDs, RBAC,
  #   webhooks, services). On first install, Helm waits for ALL
  #   resources to be ready. The default 5m timeout isn't enough
  #   on resource-constrained nodes (ARM, homelab).
  #   Helm records the install as "Failed" if timeout expires,
  #   even if pods eventually come up healthy. A failed release
  #   requires manual cleanup (delete helm secrets) to retry.
  install:
    crds: CreateReplace
    timeout: 10m
  upgrade:
    crds: CreateReplace
    timeout: 10m
  values:
    # Start with minimal resource footprint for homelab
    replicaCount: 1
    admissionController:
      container:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 768Mi
      initContainer:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
    backgroundController:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
    cleanupController:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
    reportsController:
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
