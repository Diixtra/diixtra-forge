apiVersion: v1
kind: Namespace
metadata:
  name: kyverno-system
  labels:
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/managed-by: flux
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      version: "*"          # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 1h
  # ── Timeouts ──────────────────────────────────────────────────
  # LEARNING NOTE — WHY 10m:
  #   Kyverno installs 69 resources (4 controllers, CRDs, RBAC,
  #   webhooks, services). On first install, Helm waits for ALL
  #   resources to be ready. The default 5m timeout isn't enough
  #   on resource-constrained nodes (ARM, homelab).
  #   Helm records the install as "Failed" if timeout expires,
  #   even if pods eventually come up healthy. A failed release
  #   requires manual cleanup (delete helm secrets) to retry.
  install:
    crds: CreateReplace
    timeout: 10m
  upgrade:
    crds: CreateReplace
    timeout: 10m
  values:
    # Start with minimal resource footprint for homelab
    replicaCount: 1
    # ── Webhook namespace exclusions ──────────────────────────────
    # LEARNING NOTE — WHY EXCLUDE NAMESPACES FROM THE WEBHOOK:
    #   Kyverno's fail-closed webhook (validate.kyverno.svc-fail)
    #   is called by the API server for every dry-run, even in
    #   namespaces where no Enforce policies apply. If Kyverno is
    #   unhealthy (crash loop, startup), the webhook times out and
    #   blocks ALL Flux dry-runs — including flux-system itself.
    #
    #   namespaceSelector tells the API server to skip the webhook
    #   entirely for these namespaces. This is different from
    #   config.resourceFilters (which still calls the webhook but
    #   skips processing). When Kyverno is down, only the selector
    #   prevents timeouts.
    #
    #   All listed namespaces are already excluded from every
    #   Enforce policy (require-resource-limits, pod-security-baseline),
    #   so this doesn't change the effective security posture.
    config:
      webhooks:
        - namespaceSelector:
            matchExpressions:
              - key: kubernetes.io/metadata.name
                operator: NotIn
                values:
                  - kyverno-system
                  - kube-system
                  - flux-system
                  - monitoring
                  - democratic-csi
    # Schedule on amd64 nodes only. Pi 4 (2 GB RAM) can't sustain
    # the admission controller — liveness probes time out under
    # memory pressure, causing 100+ restarts/day. Each restart
    # makes the fail-closed webhook unreachable, blocking all Flux
    # dry-runs and breaking the entire reconciliation chain.
    admissionController:
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      container:
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 768Mi
      initContainer:
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
    backgroundController:
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
    cleanupController:
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
    reportsController:
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 512Mi
