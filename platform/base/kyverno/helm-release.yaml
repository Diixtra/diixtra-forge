apiVersion: v1
kind: Namespace
metadata:
  name: kyverno-system
  labels:
    app.kubernetes.io/part-of: kyverno
    app.kubernetes.io/managed-by: flux
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno-system
spec:
  interval: 30m
  chart:
    spec:
      chart: kyverno
      version: "*"          # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    # Start with minimal resource footprint for homelab
    replicaCount: 1
