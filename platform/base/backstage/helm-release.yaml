apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backstage
  namespace: backstage
spec:
  interval: 30m
  chart:
    spec:
      chart: backstage
      version: "2.6.3"
      sourceRef:
        kind: HelmRepository
        name: backstage
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  values:
    backstage:
      image:
        registry: ghcr.io
        repository: diixtra/backstage
        # Pinned to last known working build. Re-enable image automation
        # only after adding a CI smoke test that verifies the image starts.
        tag: "build-49"
      # 1Password item "backstage-github-app" fields must be named exactly:
      # GITHUB_APP_ID, GITHUB_APP_CLIENT_ID, GITHUB_APP_CLIENT_SECRET,
      # GITHUB_APP_PRIVATE_KEY, GITHUB_APP_WEBHOOK_SECRET
      annotations:
        reloader.stakater.com/auto: "true" # Auto-restart when referenced Secrets/ConfigMaps change
      extraEnvVarsSecrets:
        - backstage-github-app
      # The chart defaults give only 30s for startup (failureThreshold=3,
      # periodSeconds=10). Backstage needs 60-90s to initialise plugins
      # and connect to PostgreSQL. Override to allow up to 5 minutes.
      startupProbe:
        httpGet:
          path: /.backstage/health/v1/liveness
          port: 7007
          scheme: HTTP
        failureThreshold: 30
        periodSeconds: 10
      readinessProbe:
        httpGet:
          path: /.backstage/health/v1/readiness
          port: 7007
          scheme: HTTP
        initialDelaySeconds: 0
        periodSeconds: 10
        failureThreshold: 3
      livenessProbe:
        httpGet:
          path: /.backstage/health/v1/liveness
          port: 7007
          scheme: HTTP
        initialDelaySeconds: 0
        periodSeconds: 10
        failureThreshold: 3
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: false
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      appConfig:
        app:
          title: Kazie Backstage
          baseUrl: https://backstage.${LAB_DOMAIN}
        backend:
          baseUrl: https://backstage.${LAB_DOMAIN}
          listen:
            port: 7007
          database:
            client: pg
            connection:
              host: backstage-postgresql
              port: 5432
              user: backstage
              password: $${POSTGRES_PASSWORD}
        integrations:
          github:
            - host: github.com
              apps:
                - appId: $${GITHUB_APP_ID}
                  clientId: $${GITHUB_APP_CLIENT_ID}
                  clientSecret: $${GITHUB_APP_CLIENT_SECRET}
                  privateKey: $${GITHUB_APP_PRIVATE_KEY}
                  webhookSecret: $${GITHUB_APP_WEBHOOK_SECRET}
        scaffolder:
          defaultAuthor:
            name: Backstage Scaffolder
            email: backstage@kazie.co.uk
          defaultCommitMessage: "feat: scaffolded from Backstage template"
        auth:
          environment: production
          providers:
            github:
              production:
                clientId: $${GITHUB_APP_CLIENT_ID}
                clientSecret: $${GITHUB_APP_CLIENT_SECRET}
        kubernetes:
          serviceLocatorMethod:
            type: multiTenant
          clusterLocatorMethods:
            - type: config
              clusters:
                - url: https://kubernetes.default.svc
                  name: homelab
                  authProvider: serviceAccount
                  skipTLSVerify: true
        kubernetesIngestor:
          components:
            enabled: true
            taskRunner:
              frequency: 600
              timeout: 600
            excludedNamespaces:
              - kube-system
              - kube-public
              - kube-node-lease
              - flux-system
        catalog:
          rules:
            - allow: [Component, System, API, Resource, Location, Template]
          locations:
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/deploy-service/template.yaml
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/pin-helm-version/template.yaml
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/create-infra-component/template.yaml
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/add-reverse-proxy/template.yaml
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/toggle-helm-release/template.yaml
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/cluster-entity.yaml
    postgresql:
      enabled: true
      auth:
        username: backstage
        existingSecret: backstage-postgresql
        secretKeys:
          userPasswordKey: password
      primary:
        podSecurityContext:
          enabled: true
          runAsNonRoot: true
          runAsUser: 1001
          fsGroup: 1001
          seccompProfile:
            type: RuntimeDefault
        containerSecurityContext:
          enabled: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          runAsUser: 1001
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        persistence:
          storageClass: truenas-iscsi
