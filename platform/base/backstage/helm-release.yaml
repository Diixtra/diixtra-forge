apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: backstage
  namespace: backstage
spec:
  interval: 30m
  chart:
    spec:
      chart: backstage
      version: "*" # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: backstage
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
  upgrade:
    timeout: 10m
  values:
    backstage:
      image:
        registry: ghcr.io
        repository: diixtra/backstage
        tag: "build-26" # {"$imagepolicy": "flux-system:backstage:tag"}
      # 1Password item "backstage-github-app" fields must be named exactly:
      # GITHUB_APP_ID, GITHUB_APP_CLIENT_ID, GITHUB_APP_CLIENT_SECRET,
      # GITHUB_APP_PRIVATE_KEY, GITHUB_APP_WEBHOOK_SECRET
      extraEnvVarsSecrets:
        - backstage-github-app
      extraEnvVars:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backstage-postgresql
              key: password
      podSecurityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: false
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1Gi
      appConfig:
        app:
          title: Kazie Backstage
          baseUrl: https://backstage.${LAB_DOMAIN}
        backend:
          baseUrl: https://backstage.${LAB_DOMAIN}
          listen:
            port: 7007
          database:
            client: pg
            connection:
              host: backstage-postgresql
              port: 5432
              user: backstage
              password: $${POSTGRES_PASSWORD}
        integrations:
          github:
            - host: github.com
              apps:
                - appId: $${GITHUB_APP_ID}
                  clientId: $${GITHUB_APP_CLIENT_ID}
                  clientSecret: $${GITHUB_APP_CLIENT_SECRET}
                  privateKey: $${GITHUB_APP_PRIVATE_KEY}
                  webhookSecret: $${GITHUB_APP_WEBHOOK_SECRET}
        scaffolder:
          defaultAuthor:
            name: Backstage Scaffolder
            email: backstage@kazie.co.uk
          defaultCommitMessage: "feat: scaffolded from Backstage template"
        auth:
          environment: production
          providers:
            github:
              production:
                clientId: $${GITHUB_APP_CLIENT_ID}
                clientSecret: $${GITHUB_APP_CLIENT_SECRET}
        catalog:
          rules:
            - allow: [Component, System, API, Resource, Location, Template]
          locations:
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/deploy-service/template.yaml
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/pin-helm-version/template.yaml
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/create-infra-component/template.yaml
            - type: url
              target: https://github.com/Diixtra/diixtra-forge/blob/main/platform/base/backstage/templates/add-reverse-proxy/template.yaml
    postgresql:
      enabled: true
      auth:
        username: backstage
        existingSecret: backstage-postgresql
        secretKeys:
          userPasswordKey: password
      primary:
        podSecurityContext:
          enabled: true
          runAsNonRoot: true
          runAsUser: 1001
          fsGroup: 1001
          seccompProfile:
            type: RuntimeDefault
        containerSecurityContext:
          enabled: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          runAsNonRoot: true
          runAsUser: 1001
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        persistence:
          storageClass: truenas-iscsi
