# Syncs Crossplane-generated Neon credentials from crossplane-system
# to the backstage namespace so the HelmRelease can read them via valuesFrom.
# Runs every 5 minutes to pick up password rotations automatically.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: neon-secret-sync
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: backstage
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/managed-by: flux
        spec:
          restartPolicy: OnFailure
          serviceAccountName: neon-secret-sync
          containers:
            - name: sync
              image: docker.io/alpine/k8s:1.35.2
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  echo "=== Neon Secret Sync — $$(date) ==="

                  SRC_SECRET="neon-backstage-outputs"
                  SRC_NS="crossplane-system"
                  DST_SECRET="neon-backstage-credentials"
                  DST_NS="backstage"

                  # Read source secret from Crossplane
                  HOST=$$(kubectl get secret "$$SRC_SECRET" -n "$$SRC_NS" \
                    -o jsonpath='{.data.database_host}' | base64 -d)
                  PASS=$$(kubectl get secret "$$SRC_SECRET" -n "$$SRC_NS" \
                    -o jsonpath='{.data.database_password}' | base64 -d)

                  if [ -z "$$HOST" ] || [ -z "$$PASS" ]; then
                    echo "ERROR: Source secret missing database_host or database_password"
                    exit 1
                  fi

                  # Create or update destination secret
                  kubectl create secret generic "$$DST_SECRET" -n "$$DST_NS" \
                    --from-literal=database_host="$$HOST" \
                    --from-literal=database_password="$$PASS" \
                    --dry-run=client -o yaml | kubectl apply -f -

                  echo "Synced $$SRC_NS/$$SRC_SECRET → $$DST_NS/$$DST_SECRET"
                  echo "=== Sync complete ==="
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 65534
                capabilities:
                  drop:
                    - ALL
                readOnlyRootFilesystem: true
                seccompProfile:
                  type: RuntimeDefault
---
# Run once immediately so credentials are available before the first CronJob tick
apiVersion: batch/v1
kind: Job
metadata:
  name: neon-secret-sync-init
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: backstage
    app.kubernetes.io/managed-by: flux
  annotations:
    # Jobs are immutable — Flux must force-replace on spec changes (e.g. image bumps)
    kustomize.toolkit.fluxcd.io/force: enabled
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/managed-by: flux
    spec:
      restartPolicy: OnFailure
      serviceAccountName: neon-secret-sync
      containers:
        - name: sync
          image: docker.io/alpine/k8s:1.35.2
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              echo "=== Neon Secret Sync Init — $$(date) ==="

              SRC_SECRET="neon-backstage-outputs"
              SRC_NS="crossplane-system"
              DST_SECRET="neon-backstage-credentials"
              DST_NS="backstage"

              HOST=$$(kubectl get secret "$$SRC_SECRET" -n "$$SRC_NS" \
                -o jsonpath='{.data.database_host}' | base64 -d)
              PASS=$$(kubectl get secret "$$SRC_SECRET" -n "$$SRC_NS" \
                -o jsonpath='{.data.database_password}' | base64 -d)

              if [ -z "$$HOST" ] || [ -z "$$PASS" ]; then
                echo "ERROR: Source secret missing database_host or database_password"
                exit 1
              fi

              kubectl create secret generic "$$DST_SECRET" -n "$$DST_NS" \
                --from-literal=database_host="$$HOST" \
                --from-literal=database_password="$$PASS" \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Synced $$SRC_NS/$$SRC_SECRET → $$DST_NS/$$DST_SECRET"
              echo "=== Init sync complete ==="
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65534
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: neon-secret-sync
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: backstage
    app.kubernetes.io/managed-by: flux
---
# Read secrets in crossplane-system
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neon-secret-sync-source
  namespace: crossplane-system
  labels:
    app.kubernetes.io/part-of: backstage
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["neon-backstage-outputs"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neon-secret-sync-source
  namespace: crossplane-system
  labels:
    app.kubernetes.io/part-of: backstage
    app.kubernetes.io/managed-by: flux
subjects:
  - kind: ServiceAccount
    name: neon-secret-sync
    namespace: backstage
roleRef:
  kind: Role
  name: neon-secret-sync-source
  apiGroup: rbac.authorization.k8s.io
---
# Create/update secrets in backstage namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: neon-secret-sync-dest
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: backstage
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["neon-backstage-credentials"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: neon-secret-sync-dest
  namespace: backstage
  labels:
    app.kubernetes.io/part-of: backstage
    app.kubernetes.io/managed-by: flux
subjects:
  - kind: ServiceAccount
    name: neon-secret-sync
    namespace: backstage
roleRef:
  kind: Role
  name: neon-secret-sync-dest
  apiGroup: rbac.authorization.k8s.io
