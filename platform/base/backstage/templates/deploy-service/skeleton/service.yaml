apiVersion: v1
kind: Service
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.name }}
  labels:
    app.kubernetes.io/name: ${{ values.name }}
    app.kubernetes.io/managed-by: flux
spec:
  selector:
    app.kubernetes.io/name: ${{ values.name }}
  ports:
    - port: ${{ values.port }}
      targetPort: ${{ values.port }}
