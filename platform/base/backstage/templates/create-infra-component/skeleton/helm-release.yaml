apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ${{ values.name }}
  namespace: ${{ values.namespace }}
spec:
  interval: 30m
  chart:
    spec:
      chart: ${{ values.chart }}
      version: "${{ values.version }}"
      sourceRef:
        kind: HelmRepository
        name: ${{ values.helmRepoName }}
        namespace: flux-system
      interval: 1h
  values: {}
