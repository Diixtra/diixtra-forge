# ══════════════════════════════════════════════════════════════════
# Control Plane Health Alerts
# ══════════════════════════════════════════════════════════════════
# Detects etcd I/O issues, API server instability, and control
# plane crash-loops — the exact failure mode from the March 2026
# outage (see docs/troubleshooting/etcd-io-saturation-control-plane-crash.md).
# ══════════════════════════════════════════════════════════════════
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: control-plane-health
  namespace: monitoring
  labels:
    app.kubernetes.io/part-of: cluster-alerting
    app.kubernetes.io/managed-by: flux
spec:
  groups:
    - name: etcd
      interval: 30s
      rules:
        # ── Critical: etcd WAL fsync dangerously slow ─────────────
        # When fdatasync p99 exceeds 1s, etcd falls behind on heartbeats
        # and raft leader elections, causing the control plane to crash-loop.
        - alert: EtcdFsyncLatencyCritical
          expr: |
            histogram_quantile(0.99,
              rate(etcd_disk_wal_fsync_duration_seconds_bucket{job="etcd"}[5m])
            ) > 1
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "etcd WAL fsync latency > 1s on {{ $labels.instance }}"
            description: >-
              etcd fdatasync p99 is {{ $value | humanizeDuration }}.
              This caused a full cluster outage in March 2026.
              Check disk I/O on the control plane node with `iostat -x 1 3`.

        # ── Warning: etcd WAL fsync elevated ──────────────────────
        # Early warning — fires before critical, giving time to investigate.
        - alert: EtcdFsyncLatencyWarning
          expr: |
            histogram_quantile(0.99,
              rate(etcd_disk_wal_fsync_duration_seconds_bucket{job="etcd"}[5m])
            ) > 0.5
          for: 3m
          labels:
            severity: warning
          annotations:
            summary: "etcd WAL fsync latency > 500ms on {{ $labels.instance }}"
            description: >-
              etcd fdatasync p99 is {{ $value | humanizeDuration }}.
              Investigate disk I/O before this escalates.

    - name: control-plane-restarts
      interval: 30s
      rules:
        # ── Critical: API server crash-looping ────────────────────
        - alert: ApiServerRestarts
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="kube-system",
                pod=~"kube-apiserver-.*"
              }[10m]
            ) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "API server {{ $labels.pod }} restarted {{ $value | humanize }} times in 10m"
            description: >-
              The API server is crash-looping. This affects all cluster operations.
              Check etcd health and control plane node resources.

        # ── Critical: scheduler crash-looping ─────────────────────
        - alert: SchedulerCrashLoop
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="kube-system",
                pod=~"kube-scheduler-.*"
              }[10m]
            ) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Scheduler {{ $labels.pod }} restarted {{ $value | humanize }} times in 10m"
            description: >-
              The kube-scheduler is crash-looping. New pods cannot be scheduled.

        # ── Critical: controller-manager crash-looping ────────────
        - alert: ControllerManagerCrashLoop
          expr: |
            increase(
              kube_pod_container_status_restarts_total{
                namespace="kube-system",
                pod=~"kube-controller-manager-.*"
              }[10m]
            ) > 3
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Controller-manager {{ $labels.pod }} restarted {{ $value | humanize }} times in 10m"
            description: >-
              The kube-controller-manager is crash-looping.
              Deployments, ReplicaSets, and other controllers will not reconcile.

    - name: node-health
      interval: 30s
      rules:
        # ── Critical: node not ready ──────────────────────────────
        - alert: NodeNotReady
          expr: |
            kube_node_status_condition{condition="Ready", status="true"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} is NotReady"
            description: >-
              Node has been NotReady for over 2 minutes.
              Check kubelet status and node connectivity.
