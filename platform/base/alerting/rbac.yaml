# ClusterRole for Grafana Alloy to read PrometheusRule CRDs.
# Required by the mimir.rules.kubernetes component to discover
# alerting rules and sync them to Grafana Cloud.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: grafana-alloy-prometheusrule-reader
  labels:
    app.kubernetes.io/part-of: grafana-alloy
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheusrules"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: grafana-alloy-prometheusrule-reader
  labels:
    app.kubernetes.io/part-of: grafana-alloy
    app.kubernetes.io/managed-by: flux
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: grafana-alloy-prometheusrule-reader
subjects:
  - kind: ServiceAccount
    name: grafana-alloy
    namespace: monitoring
