apiVersion: batch/v1
kind: CronJob
metadata:
  name: node-cleanup
  namespace: kube-system
  labels:
    app.kubernetes.io/managed-by: flux
spec:
  schedule: "0 3 * * *"   # Daily at 03:00
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/managed-by: flux
        spec:
          restartPolicy: OnFailure
          hostPID: true
          tolerations:
            - operator: Exists
          containers:
            - name: cleanup
              image: docker.io/library/alpine:3
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "=== Node Cleanup — $(date) ==="

                  # Clean up completed/failed pods cluster-wide via kubectl
                  # (Evicted pods from DiskPressure linger and waste resources)
                  echo "Pruning Evicted/Failed pods..."
                  kubectl get pods -A --field-selector=status.phase=Failed \
                    -o jsonpath='{range .items[*]}{.metadata.namespace}{" "}{.metadata.name}{"\n"}{end}' | \
                  while read ns pod; do
                    if [ -n "$ns" ] && [ -n "$pod" ]; then
                      echo "  Deleting $ns/$pod"
                      kubectl delete pod "$pod" -n "$ns" --grace-period=0 || true
                    fi
                  done

                  # Clean up dead containers and unused images via crictl
                  echo "Cleaning dead containers (via nsenter into host)..."
                  nsenter -t 1 -m -- /usr/local/bin/crictl rmi --prune 2>/dev/null || true

                  echo "=== Cleanup complete ==="
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                privileged: true
          serviceAccountName: node-cleanup
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-cleanup
  namespace: kube-system
  labels:
    app.kubernetes.io/managed-by: flux
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-cleanup
  labels:
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-cleanup
  labels:
    app.kubernetes.io/managed-by: flux
subjects:
  - kind: ServiceAccount
    name: node-cleanup
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: node-cleanup
  apiGroup: rbac.authorization.k8s.io
