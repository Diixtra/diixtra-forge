apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-kubernetes
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: mcp-kubernetes
    app.kubernetes.io/part-of: mcp-servers
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-kubernetes
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-kubernetes
        app.kubernetes.io/part-of: mcp-servers
        app.kubernetes.io/managed-by: flux
    spec:
      serviceAccountName: mcp-kubernetes
      containers:
        - name: k8s-mcp-server
          image: ghcr.io/alexei-led/k8s-mcp-server:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: K8S_MCP_TRANSPORT
              value: "streamable-http"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
