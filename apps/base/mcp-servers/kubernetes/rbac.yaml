apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-kubernetes
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: mcp-kubernetes
    app.kubernetes.io/part-of: mcp-servers
    app.kubernetes.io/managed-by: flux
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mcp-kubernetes
  labels:
    app.kubernetes.io/name: mcp-kubernetes
    app.kubernetes.io/part-of: mcp-servers
    app.kubernetes.io/managed-by: flux
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - endpoints
      - namespaces
      - nodes
      - events
      - configmaps
      - persistentvolumeclaims
      - persistentvolumes
      - replicationcontrollers
      - serviceaccounts
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - replicasets
      - statefulsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources:
      - roles
      - rolebindings
      - clusterroles
      - clusterrolebindings
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list", "watch"]
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list", "watch"]
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - helmrepositories
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mcp-kubernetes
  labels:
    app.kubernetes.io/name: mcp-kubernetes
    app.kubernetes.io/part-of: mcp-servers
    app.kubernetes.io/managed-by: flux
subjects:
  - kind: ServiceAccount
    name: mcp-kubernetes
    namespace: mcp-servers
roleRef:
  kind: ClusterRole
  name: mcp-kubernetes
  apiGroup: rbac.authorization.k8s.io
