apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-terraform
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: mcp-terraform
    app.kubernetes.io/part-of: mcp-servers
    app.kubernetes.io/managed-by: flux
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-terraform
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-terraform
        app.kubernetes.io/part-of: mcp-servers
        app.kubernetes.io/managed-by: flux
    spec:
      containers:
        - name: terraform-mcp-server
          image: hashicorp/terraform-mcp-server:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: TRANSPORT_MODE
              value: "streamable-http"
            - name: TRANSPORT_HOST
              value: "0.0.0.0"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
