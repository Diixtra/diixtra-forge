apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-stripe
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: mcp-stripe
    app.kubernetes.io/part-of: mcp-servers
    app.kubernetes.io/managed-by: flux
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-stripe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-stripe
        app.kubernetes.io/part-of: mcp-servers
        app.kubernetes.io/managed-by: flux
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: mcp-stripe
          image: node:22-alpine
          command:
            - sh
            - -ec
            # @stripe/mcp reads STRIPE_API_KEY from env — no --api-key flag
            # needed. This avoids leaking the key in the process command line.
            - exec npx -y supergateway --stdio "npx -y @stripe/mcp --tools=all" --port 8080
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: HOME
              value: "/tmp"
            - name: STRIPE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stripe-api-key
                  key: credential
          startupProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
