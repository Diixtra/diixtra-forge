# Persistent storage for the knowledge graph JSONL file.
# Uses the cluster's default StorageClass (local-path on Rancher Desktop).
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mcp-memory-data
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: mcp-memory
    app.kubernetes.io/part-of: mcp-servers
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
