apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-cloudflare
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: mcp-cloudflare
    app.kubernetes.io/part-of: mcp-servers
    app.kubernetes.io/managed-by: flux
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-cloudflare
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-cloudflare
        app.kubernetes.io/part-of: mcp-servers
        app.kubernetes.io/managed-by: flux
    spec:
      containers:
        - name: mcp-cloudflare
          image: node:22-alpine
          command:
            - sh
            - -c
            - npx -y supergateway --stdio "npx -y @cloudflare/mcp-server-cloudflare" --port 8080
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: cloudflare-mcp-token
                  key: credential
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            capabilities:
              drop:
                - ALL
