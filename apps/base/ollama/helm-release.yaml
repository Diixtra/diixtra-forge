# Ollama — local LLM inference server with GPU acceleration
#
# Ollama serves large language models locally. It requires:
#   1. GPU node (nodeSelector + toleration for nvidia.com/gpu taint)
#   2. Persistent storage for downloaded models (~5-50GB per model)
#   3. nvidia.com/gpu resource request to get GPU access via device plugin
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ollama
  namespace: ollama
spec:
  interval: 30m
  chart:
    spec:
      chart: ollama
      version: "*" # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: ollama
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  values:
    ollama:
      gpu:
        enabled: true
        type: nvidia
        number: 1

    # Schedule on GPU node and tolerate its taint.
    nodeSelector:
      node.kubernetes.io/gpu: "true"
    tolerations:
      - key: nvidia.com/gpu
        operator: Equal
        value: present
        effect: NoSchedule

    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
      seccompProfile:
        type: RuntimeDefault

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false

    resources:
      requests:
        cpu: 500m
        memory: 2Gi
      limits:
        cpu: "8"
        memory: 16Gi

    persistentVolume:
      enabled: true
      storageClass: truenas-nfs
      size: 100Gi
      accessModes:
        - ReadWriteOnce

    service:
      type: ClusterIP
      port: 11434

    ingress:
      enabled: false
