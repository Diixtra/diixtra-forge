apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # CRD-dependent — Caddy has OnePasswordItem
  - ../base/caddy
patches:
  # Replace base Caddyfile with dev-specific config
  - target:
      kind: ConfigMap
      name: caddy-config
      namespace: caddy-system
    path: caddy/patches/caddyfile-patch.yaml
