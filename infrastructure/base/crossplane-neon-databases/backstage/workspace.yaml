# ══════════════════════════════════════════════════════════════════
# Neon Database — Backstage
#
# Provisions a Neon project named "backstage" in aws-eu-west-2
# (London). Creates project, default branch, endpoint, role, and
# database in a single neon_project resource.
#
# Outputs written to Secret "neon-backstage-outputs" in
# crossplane-system:
#   database_host     — Neon endpoint hostname
#   database_password — Role password (sensitive)
#
# BOOTSTRAP: After first reconciliation, copy database_host into
# clusters/homelab/vars.yaml as NEON_BACKSTAGE_HOST.
# ══════════════════════════════════════════════════════════════════
apiVersion: tf.upbound.io/v1beta1
kind: Workspace
metadata:
  name: neon-backstage
  annotations:
    crossplane.io/external-name: neon-backstage
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/component: neon
    app.kubernetes.io/managed-by: flux
spec:
  providerConfigRef:
    name: neon-default
  forProvider:
    source: Inline
    module: |
      terraform {
        required_providers {
          neon = {
            source  = "kislerdm/neon"
            version = "~> 0.6"
          }
        }
      }

      resource "neon_project" "backstage" {
        name       = "backstage"
        region_id  = "aws-eu-west-2"
        pg_version = 16

        branch {
          database_name = "backstage"
          role_name     = "backstage"
        }

        default_endpoint_settings {
          suspend_timeout_seconds  = 300
          autoscaling_limit_min_cu = 0.25
          autoscaling_limit_max_cu = 1
        }
      }

      output "database_host" {
        value     = neon_project.backstage.database_host
        sensitive = false
      }

      output "database_password" {
        value     = neon_project.backstage.database_password
        sensitive = true
      }
  writeConnectionSecretToRef:
    namespace: crossplane-system
    name: neon-backstage-outputs
