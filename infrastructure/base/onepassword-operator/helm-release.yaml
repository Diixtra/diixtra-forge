apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: onepassword-operator
  namespace: onepassword-system
spec:
  interval: 30m
  chart:
    spec:
      chart: connect
      version: "2.3.x"      # Float within 2.3 patches — monitor operator logs after Flux upgrades
      sourceRef:
        kind: HelmRepository
        name: onepassword
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  values:
    connect:
      create: false              # No Connect server — using Service Account mode
    operator:
      create: true
      authMethod: service-account
      # The operator embeds a WASM runtime (extism) for the 1Password SDK.
      # Under memory pressure or API instability, the WASM allocator
      # (dlmalloc) can corrupt its heap with an unrecoverable OOB error.
      # 1Gi gives the WASM runtime headroom to avoid this.
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          cpu: 500m
          memory: 1Gi
      serviceAccountToken:
        # The chart mounts this Secret directly into the operator pod.
        # This is the ONE bootstrap secret that must be created manually
        # before Flux can deploy this HelmRelease:
        #
        #   kubectl create secret generic onepassword-service-account-token \
        #     --namespace onepassword-system \
        #     --from-literal=token="$(op read 'op://Homelab/1password-operator-service-account/credential')"
        #
        # Do NOT set 'value' here — that causes the chart to create a
        # second secret, which breaks on re-bootstrap when the source
        # secret (valuesFrom) doesn't exist yet.
        name: onepassword-service-account-token
        key: token