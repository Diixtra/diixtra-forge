# Flux Operator — lifecycle manager and web dashboard for Flux CD
#
# Provides a real-time web UI for monitoring GitOps pipelines,
# reconciliation status, and troubleshooting. Installs into flux-system
# alongside the existing Flux controllers.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: flux-operator
      version: "*" # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: flux-operator
        namespace: flux-system
      interval: 1h
  install:
    timeout: 5m
  upgrade:
    timeout: 5m
