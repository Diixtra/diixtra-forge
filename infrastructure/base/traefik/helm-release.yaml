apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: "*"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
    timeout: 10m
  upgrade:
    crds: CreateReplace
    timeout: 10m
  values:
    ports:
      web:
        exposedPort: 80
        http:
          redirections:
            entryPoint:
              to: websecure
              scheme: https
      websecure:
        exposedPort: 443
        http:
          tls:
            enabled: true
    certificatesResolvers:
      letsencrypt:
        acme:
          email: "${ACME_EMAIL}"
          storage: /data/acme.json
          caServer: https://acme-v02.api.letsencrypt.org/directory
          dnsChallenge:
            provider: cloudflare
            propagation:
              delayBeforeChecks: "60"
              disableChecks: true
            resolvers:
              - "1.1.1.1:53"
    persistence:
      enabled: true
      existingClaim: traefik-data
      path: /data
    providers:
      kubernetesCRD:
        allowExternalNameServices: true
    service:
      type: LoadBalancer
      annotations:
        io.cilium/lb-ipam-ips: "${LB_TRAEFIK_IP}"
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    podSecurityContext:
      fsGroup: 65532
    deployment:
      annotations:
        reloader.stakater.com/auto: "true" # Auto-restart when referenced Secrets/ConfigMaps change
      # NFS does not honour fsGroup — the volume is root-owned and Traefik
      # runs as UID 65532.  Fix permissions before the main container starts.
      initContainers:
        - name: volume-permissions
          image: busybox:latest
          command: ["sh", "-c", "chown -R 65532:65532 /data"]
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 32Mi
      dnsConfig:
        options:
          - name: ndots
            value: "2"
    env:
      - name: CF_DNS_API_TOKEN
        valueFrom:
          secretKeyRef:
            name: cloudflare-api-token
            key: credential
    api:
      dashboard: true
