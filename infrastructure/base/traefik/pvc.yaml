apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traefik-data
  namespace: traefik-system
  labels:
    app.kubernetes.io/name: traefik
    app.kubernetes.io/part-of: traefik
    app.kubernetes.io/managed-by: flux
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi
