# ══════════════════════════════════════════════════════════════════
# ARC GitHub App Credentials — synced from 1Password via Operator
# ══════════════════════════════════════════════════════════════════
#
# LEARNING NOTE — SECRET CHAIN FOR ARC (GitHub App):
#   ARC needs GitHub credentials to register runners. The flow is:
#
#   1Password (source of truth)
#        │  item fields: github_app_id (text), github_app_installation_id (text),
#        │               github_app_private_key (FILE attachment, not text —
#        │               the operator strips newlines from text fields,
#        │               which breaks PEM parsing)
#        │
#   1Password Operator (watches this OnePasswordItem)
#        │
#   K8s Secret "github-config-secret" (created in arc-runners)
#        │
#   ARC runner-set HelmRelease (references the secret name)
#        │
#   Listener pod (authenticates as GitHub App, long-polls for jobs)
#
#   ARC auto-detects the auth method based on which keys are present:
#     - github_token              → PAT auth
#     - github_app_id + github_app_installation_id + github_app_private_key → App auth
#
#   GitHub App is preferred over PAT because:
#     - Not tied to a user account (no expiry when user leaves)
#     - Fine-grained permissions (only what's needed)
#     - Higher API rate limits (per-installation, not per-user)
#
#   See https://github.com/Diixtra/diixtra-docs/blob/main/runbooks/arc-org-runner-setup.md
#
# LEARNING NOTE — WHY arc-runners NAMESPACE:
#   The github-config-secret must live in the same namespace as
#   the runner-scale-set HelmRelease. ARC's Helm chart looks for
#   the secret by name in its own namespace — it doesn't do
#   cross-namespace secret references.
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: github-config-secret
  namespace: arc-runners
  labels:
    app.kubernetes.io/part-of: github-actions-runner
    app.kubernetes.io/component: auth
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_ARC_GITHUB_APP}"
