# ══════════════════════════════════════════════════════════════════
# ARC GitHub PAT — synced from 1Password via Operator
# ══════════════════════════════════════════════════════════════════
#
# LEARNING NOTE — SECRET CHAIN FOR ARC:
#   ARC needs a GitHub token to register runners. The flow is:
#
#   1Password (source of truth)
#        │
#   1Password Operator (watches this OnePasswordItem)
#        │
#   K8s Secret "github-config-secret" (created in arc-runners)
#        │
#   ARC runner-set HelmRelease (references the secret name)
#        │
#   Listener pod (uses the token to long-poll GitHub for jobs)
#
#   Same bootstrap chain as every other secret in the cluster.
#   The only difference: ARC expects the secret key to be
#   "github_token" (underscore, not hyphen). The 1Password item
#   field name must match this exactly.
#
# LEARNING NOTE — WHY arc-runners NAMESPACE:
#   The github-config-secret must live in the same namespace as
#   the runner-scale-set HelmRelease. ARC's Helm chart looks for
#   the secret by name in its own namespace — it doesn't do
#   cross-namespace secret references.
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: github-config-secret
  namespace: arc-runners
  labels:
    app.kubernetes.io/part-of: github-actions-runner
    app.kubernetes.io/component: auth
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/Homelab/items/github-actions-runner-pat"
