# ══════════════════════════════════════════════════════════════════
# Crossplane Provider — Terraform Bridge
#
# Shared provider-terraform instance used by both Neon and Supabase
# ProviderConfigs. Crossplane only allows one Provider CR per package;
# credential separation is handled by distinct ProviderConfig CRs
# (neon-default, supabase-default) not by multiple Provider CRs.
# ══════════════════════════════════════════════════════════════════
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-terraform
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/managed-by: flux
spec:
  package: xpkg.upbound.io/upbound/provider-terraform:v0
  packagePullPolicy: IfNotPresent
  revisionActivationPolicy: Automatic
  revisionHistoryLimit: 1
