# ══════════════════════════════════════════════════════════════════
# Crossplane Provider — Supabase (via provider-terraform)
#
# No native Crossplane provider exists for Supabase as of 2026-03.
# The Upbound provider-terraform bridge is used with the
# supabase-community/terraform-provider-supabase Terraform provider
# to manage Supabase projects and databases as Workspace resources.
#
# Distinct provider instance from provider-terraform-neon to allow
# independent lifecycle management and separate credential scope.
# ══════════════════════════════════════════════════════════════════
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-terraform-supabase
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/component: supabase
    app.kubernetes.io/managed-by: flux
spec:
  package: xpkg.upbound.io/upbound/provider-terraform:v0
  packagePullPolicy: IfNotPresent
  revisionActivationPolicy: Automatic
  revisionHistoryLimit: 1
