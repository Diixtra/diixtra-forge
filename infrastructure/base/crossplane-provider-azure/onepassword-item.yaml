# ══════════════════════════════════════════════════════════════════
# Azure Service Principal JSON — synced from 1Password ${OP_VAULT}
#
# 1Password item must have a field named "creds" containing the
# JSON output from: az ad sp create-for-rbac --role Contributor \
#   --scopes /subscriptions/<SUBSCRIPTION_ID>
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: azure-provider-creds
  namespace: crossplane-system
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_AZURE_SP}"
