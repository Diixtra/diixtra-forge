# ══════════════════════════════════════════════════════════════════
# ProviderConfig — Oracle Cloud Infrastructure (OCI)
#
# Secret chain:
#   1Password item "${OP_ITEM_OCI_CREDS}" in ${OP_VAULT}
#       | (1Password Operator)
#   Secret "oci-provider-creds" in crossplane-system
#       key: credentials
#       | (Crossplane OCI provider reads at reconcile time)
#   OCI APIs called with API key authentication
#
# The 1Password item field must be named "credentials" and contain
# an INI-format OCI config with the private key embedded inline:
#   [DEFAULT]
#   user=ocid1.user.oc1..xxx
#   fingerprint=xx:xx:xx:...
#   tenancy=ocid1.tenancy.oc1..xxx
#   region=eu-london-1
#   key_value=<BASE64_PRIVATE_KEY>
#
# Use key_value (not key_file) so the provider reads the key
# directly from the Secret without needing a file path.
# See Upbound OCI provider docs for exact format.
# ══════════════════════════════════════════════════════════════════
apiVersion: oci.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: default
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/managed-by: flux
spec:
  region: "${OCI_REGION}"
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: oci-provider-creds
      key: credentials
