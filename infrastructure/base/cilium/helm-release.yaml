apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: "1.19.1"
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: flux-system
      interval: 1h
  install:
    crds: CreateReplace
    timeout: 10m
  upgrade:
    crds: CreateReplace
    timeout: 10m
  # LEARNING NOTE — VALUES MUST MATCH BOOTSTRAP:
  #   The bootstrap script (scripts/bootstrap.py) installs Cilium via
  #   Helm CLI before Flux is running. When Flux later deploys this
  #   HelmRelease, it adopts the existing release. Core CNI values
  #   (kube-proxy, IPAM, L2) and all resource limits MUST match
  #   bootstrap.py's --set flags. Hubble httpV2 metrics are intentionally
  #   omitted from bootstrap — the string contains semicolons and commas
  #   that break Helm's --set parser. Flux upgrades the release on first
  #   reconcile to add them; the brief Cilium restart is acceptable.
  values:
    # --- kube-proxy replacement (eBPF datapath) ---
    kubeProxyReplacement: true
    k8sServiceHost: "${K8S_API_HOST}"
    k8sServicePort: "6443"

    # --- IPAM --- kubeadm default pod CIDR ---
    ipam:
      operator:
        clusterPoolIPv4PodCIDRList:
          - "10.244.0.0/16"

    # --- Hubble observability ---
    hubble:
      enabled: true
      relay:
        enabled: true
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      ui:
        enabled: true
        frontend:
          resources:
            requests:
              cpu: 1m
              memory: 10Mi
            limits:
              cpu: 100m
              memory: 64Mi
        backend:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 256Mi
      metrics:
        enableOpenMetrics: true
        enabled:
          - dns
          - drop
          - tcp
          - flow
          - port-distribution
          - icmp
          - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction"

    # --- L2 announcements (replaces MetalLB) ---
    l2announcements:
      enabled: true
    externalIPs:
      enabled: true

    # --- Envoy proxy ---
    # Explicit limits prevent OOM on memory-constrained ARM nodes.
    # Pi4 (2GB) excluded — tcmalloc requires 1GB contiguous mmap on startup.
    envoy:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: cilium.io/no-schedule
                    operator: NotIn
                    values:
                      - "true"
                  - key: node.kubernetes.io/low-memory
                    operator: DoesNotExist
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi

    # --- Agent resources ---
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # --- Operator ---
    operator:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 250m
          memory: 256Mi

    # --- Network Policy Audit Mode ---
    # Log policy violations without dropping traffic. All CiliumNetworkPolicy
    # resources are observed-only until this is removed or set to false.
    # Monitor via Hubble UI at cilium.lab.kazie.co.uk before enforcing.
    policyAuditMode: true
