# ══════════════════════════════════════════════════════════════════
# Flux Image Automation for Container Images
# ══════════════════════════════════════════════════════════════════
#
# LEARNING NOTE — HOW IMAGE AUTOMATION WORKS:
#   Three resources work together to auto-update container images:
#
#   1. ImageRepository → "Which registry to scan?" (GHCR, Docker Hub, etc.)
#   2. ImagePolicy     → "How to pick the latest?" (semver, alphabetical, digest)
#   3. ImageUpdateAutomation → "Where to commit the update?" (which Git repo + path)
#
#   The image-reflector-controller handles (1) and (2).
#   The image-automation-controller handles (3).
#
#   Both must be installed via --components-extra at bootstrap time.
#   They're not included by default because most production clusters
#   don't want fully automated image updates.
# ══════════════════════════════════════════════════════════════════

---
# ── ImageRepository: Tell Flux WHERE to look for images ──────────
# Scans GHCR every 5 minutes for new tags under diixtra/backstage.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImageRepository
metadata:
  name: backstage
  namespace: flux-system
spec:
  image: ghcr.io/diixtra/backstage
  interval: 5m0s
  # No secretRef needed — public GHCR image.

---
# ── ImagePolicy: Tell Flux HOW to pick the latest image ──────────
#
# LEARNING NOTE — WHY NUMERICAL ORDERING ON build-N TAGS:
#   Each CI run produces a tag like build-42, build-43, etc.
#   The run_number is monotonically increasing, so numerical
#   ordering always picks the most recent build. Unlike :latest
#   (where the tag never changes and setters are a no-op),
#   immutable build-N tags produce real git commits on each push.
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: backstage
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: backstage
  policy:
    numerical:
      order: asc
  filterTags:
    pattern: '^build-(?P<nr>\d+)$'
    extract: '$nr'

---
# ── ImageUpdateAutomation: Scan infrastructure path ──────────────
# Currently no $imagepolicy markers in ./infrastructure — kept for
# future use when infrastructure-layer images need automation.
#
# LEARNING NOTE — THE GIT COMMIT FLOW:
#   When a new image is detected, this resource tells the
#   image-automation-controller to:
#     1. Clone the Git repo
#     2. Find files with image policy markers (special comments)
#     3. Update the image reference in those files
#     4. Commit and push the change
#     5. Normal Flux reconciliation picks up the new commit
#
#   The commit message template uses Go templating to include
#   which images were updated and their new versions.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: ${FLUX_GIT_EMAIL}
        name: Flux Image Automation
      messageTemplate: |
        chore(images): automated update

        Automation: Flux Image Update Automation
        {{- range $image, $_ := .Changed.Objects }}
        - {{ $image.Name }}
        {{- end }}
    push:
      branch: main
  update:
    path: ./infrastructure
    strategy: Setters

---
# ── ImageUpdateAutomation: Scan platform path ────────────────────
# Separate automation for the platform layer where the Backstage
# HelmRelease lives. Uses the same Git commit flow as above.
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 5m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: ${FLUX_GIT_EMAIL}
        name: Flux Image Automation
      messageTemplate: |
        chore(images): automated update

        Automation: Flux Image Update Automation
        {{- range $image, $_ := .Changed.Objects }}
        - {{ $image.Name }}
        {{- end }}
    push:
      branch: main
  update:
    path: ./platform
    strategy: Setters
