# ══════════════════════════════════════════════════════════════════
# Neon API Key — synced from 1Password ${OP_VAULT} vault
#
# Create an API key at https://console.neon.tech/app/settings/api-keys
# Store in 1Password with a field named "apiKey".
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: neon-provider-creds
  namespace: crossplane-system
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/component: neon
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_NEON_API_KEY}"
