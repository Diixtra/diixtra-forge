# ══════════════════════════════════════════════════════════════════
# GCP Service Account Key — synced from 1Password ${OP_VAULT} vault
#
# The 1Password item must contain a field named "credentials" whose
# value is the full GCP service account key JSON. The Operator
# creates a Secret with one key per 1Password field, so the Secret
# key "credentials" maps directly to the ProviderConfig secretRef.
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: gcp-provider-creds
  namespace: crossplane-system
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_GCP_SA}"
