apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cloudflare-api-token
  namespace: caddy-system
  labels:
    app.kubernetes.io/part-of: caddy
    app.kubernetes.io/managed-by: flux
spec:
  # The actual 1Password item name (can contain spaces).
  # metadata.name becomes the Kubernetes Secret name.
  itemPath: "vaults/Homelab/items/cloudflare dns API Credentials"
