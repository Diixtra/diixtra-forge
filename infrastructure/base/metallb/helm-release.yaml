apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 30m
  chart:
    spec:
      chart: metallb
      version: "*"          # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: metallb
        namespace: flux-system
      interval: 1h
  # MetalLB needs CRDs installed before the controller starts watching for them.
  # The chart handles CRD installation by default.
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values: {}
