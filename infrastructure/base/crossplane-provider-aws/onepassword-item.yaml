# ══════════════════════════════════════════════════════════════════
# AWS IAM Credentials — synced from 1Password ${OP_VAULT} vault
#
# 1Password item must have a field named "creds" containing an
# INI-format AWS credentials file:
#   [default]
#   aws_access_key_id = AKIA...
#   aws_secret_access_key = ...
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: aws-provider-creds
  namespace: crossplane-system
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_AWS_CREDS}"
