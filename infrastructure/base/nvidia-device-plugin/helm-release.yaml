# NVIDIA Device Plugin — exposes GPU as nvidia.com/gpu schedulable resource
#
# Without this plugin, Kubernetes has no way to know GPUs exist on a node.
# The device plugin DaemonSet:
#   1. Runs on nodes labelled node.kubernetes.io/gpu=true
#   2. Talks to kubelet via the device plugin Unix socket
#   3. Reports GPU count as an Extended Resource (nvidia.com/gpu: N)
#   4. The scheduler can then place GPU-requesting pods on GPU nodes
#
# Time-slicing is enabled: each physical GPU is advertised as 4 virtual
# GPUs, allowing multiple workloads (e.g. Ollama + JupyterHub) to share
# a single GPU. No memory or fault isolation — a crash in one workload
# can take down all others on the same GPU.
#
# K3s auto-deployed this; kubeadm does not — hence this HelmRelease.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: nvidia-device-plugin
spec:
  interval: 30m
  chart:
    spec:
      chart: nvidia-device-plugin
      version: "*" # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: nvidia
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3
  # The chart's config-manager init/sidecar containers lack resource limits.
  # Kyverno's require-resource-limits policy blocks the upgrade without
  # these patches. Affected containers (only rendered when config.map is set):
  #   - nvidia-device-plugin-init      (initContainer, config-manager)
  #   - nvidia-device-plugin-sidecar   (container, config watcher)
  #   - mps-control-daemon-init        (initContainer, config-manager)
  #   - mps-control-daemon-sidecar     (container, config watcher)
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: DaemonSet
              name: nvidia-device-plugin
            patch: |-
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: nvidia-device-plugin
              spec:
                template:
                  spec:
                    initContainers:
                      - name: nvidia-device-plugin-init
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
                    containers:
                      - name: nvidia-device-plugin-sidecar
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
          - target:
              kind: DaemonSet
              name: nvidia-device-plugin-mps-control-daemon
            patch: |-
              apiVersion: apps/v1
              kind: DaemonSet
              metadata:
                name: nvidia-device-plugin-mps-control-daemon
              spec:
                template:
                  spec:
                    initContainers:
                      - name: mps-control-daemon-init
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
                    containers:
                      - name: mps-control-daemon-sidecar
                        resources:
                          requests:
                            cpu: 50m
                            memory: 64Mi
                          limits:
                            cpu: 200m
                            memory: 128Mi
  values:
    # Only run on nodes that have a GPU attached.
    # The first-boot script applies this label after kubeadm join.
    nodeSelector:
      node.kubernetes.io/gpu: "true"

    # Chart defaults already tolerate nvidia.com/gpu:NoSchedule and
    # CriticalAddonsOnly. No override needed — just use the defaults.

    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

    # GPU time-slicing: advertise each physical GPU as 4 virtual GPUs.
    # Lets multiple workloads (Ollama + JupyterHub GPU notebooks) share
    # one GPU via CUDA context switching.
    # NOTE: no memory or fault isolation — all slices share the full VRAM pool.
    config:
      default: "time-slicing"
      map:
        time-slicing: |-
          version: v1
          flags:
            migStrategy: none
          sharing:
            timeSlicing:
              resources:
              - name: nvidia.com/gpu
                replicas: 4
