apiVersion: v1
kind: Namespace
metadata:
  name: nvidia-device-plugin
  labels:
    app.kubernetes.io/part-of: nvidia-device-plugin
    app.kubernetes.io/managed-by: flux
    # The device plugin mounts host /dev devices and needs privileged access.
    # This label disables namespace-scoped PSA enforcement.
    pod-security.kubernetes.io/enforce: privileged
