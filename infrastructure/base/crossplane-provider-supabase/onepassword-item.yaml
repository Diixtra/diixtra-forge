# ══════════════════════════════════════════════════════════════════
# Supabase Access Token — synced from 1Password ${OP_VAULT} vault
#
# Generate at https://supabase.com/dashboard/account/tokens
# Store in 1Password with a field named "accessToken".
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: supabase-provider-creds
  namespace: crossplane-system
  labels:
    app.kubernetes.io/part-of: crossplane
    app.kubernetes.io/component: supabase
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_SUPABASE_TOKEN}"
