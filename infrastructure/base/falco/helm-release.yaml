# Falco — eBPF-based runtime security monitoring
#
# Deploys Falco as a DaemonSet on every node to detect anomalous
# container behaviour (shell spawns, sensitive file reads, privilege
# escalation, etc.) using the modern eBPF driver.
#
# Falcosidekick forwards events directly to Grafana Cloud Loki
# for centralised alerting and dashboarding.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: falco
  namespace: falco-system
spec:
  interval: 30m
  chart:
    spec:
      chart: falco
      version: "*"          # Lab: always use latest. Pin in production.
      sourceRef:
        kind: HelmRepository
        name: falcosecurity
        namespace: flux-system
      interval: 1h
  install:
    timeout: 10m
    remediation:
      retries: 3
  upgrade:
    timeout: 10m
    remediation:
      retries: 3

  # Inject Grafana Cloud API key from the 1Password-synced secret
  # into Falcosidekick's Loki config. The key never appears in Git.
  # optional: true lets Falco deploy before the Secret exists —
  # runtime detection works immediately, Loki forwarding starts
  # once the 1Password operator syncs the credential.
  valuesFrom:
    - kind: Secret
      name: grafana-cloud-credentials
      valuesKey: credential
      targetPath: falcosidekick.config.loki.apikey
      optional: true
    # Loki username/tenant injected from a ConfigMap whose values.yaml
    # key contains a YAML document inside a block scalar. This bypasses
    # both Flux's YAML/JSON round-trip (which coerces bare numeric
    # strings to numbers) and Helm's strvals parser (used by targetPath,
    # which also coerces). The block scalar preserves quoted strings.
    # See https://github.com/fluxcd/kustomize-controller/issues/554
    - kind: ConfigMap
      name: falco-loki-values
      valuesKey: values.yaml
      optional: true

  values:
    # ── Falco Driver ──────────────────────────────────────────────
    driver:
      kind: modern_ebpf

    # ── Falco Engine ──────────────────────────────────────────────
    # The default rules ship curated detections mapped to MITRE
    # ATT&CK tactics. json_output and http_output are auto-configured
    # by the chart when falcosidekick.enabled=true.
    falco:
      grpc:
        enabled: false
      grpc_output:
        enabled: false

    # ── Node Selector ───────────────────────────────────────────
    # modern_ebpf requires BPF_TRACE_RAW_TP which is not supported
    # on ARM64 Raspberry Pi kernels.
    nodeSelector:
      kubernetes.io/arch: amd64

    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule

    # ── Falcoctl (init + sidecar) ──────────────────────────────
    falcoctl:
      artifact:
        install:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
        follow:
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi

    # ── Falco Resources ──────────────────────────────────────────
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # ── Falcosidekick ─────────────────────────────────────────────
    # Forwards Falco events to Grafana Cloud Loki for centralised
    # log aggregation, alerting, and dashboard integration.
    falcosidekick:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      config:
        loki:
          # URL is Flux-substituted from cluster-vars. API key, user,
          # and tenant are injected via valuesFrom (Secret) above.
          hostport: "${GRAFANA_LOKI_URL}"

      # ── Falcosidekick UI ────────────────────────────────────────────
      # Disabled: the chart's init container lacks resource limits
      # which Kyverno's require-resource-limits policy rejects.
      # Loki is the durable event store; the ephemeral UI is not needed.
      webui:
        enabled: false
        replicaCount: 1
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        redis:
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
