# ══════════════════════════════════════════════════════════════════
# Packer Runner GitHub PAT — synced from 1Password via Operator
# ══════════════════════════════════════════════════════════════════
#
# Same 1Password item as the standard runner — the PAT has org-level
# scope. ARC requires the secret in the runner's own namespace, so
# we create a second OnePasswordItem here to sync a copy into
# packer-runners.
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: github-config-secret
  namespace: packer-runners
  labels:
    app.kubernetes.io/part-of: github-actions-runner
    app.kubernetes.io/component: auth
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/Homelab/items/github-actions-runner-pat"
