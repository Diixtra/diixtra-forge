# ══════════════════════════════════════════════════════════════════
# TrueNAS API Key — synced from 1Password ${OP_VAULT} vault
# ══════════════════════════════════════════════════════════════════
#
# LEARNING NOTE — THE SECRET CHAIN:
#   1Password item "${OP_ITEM_TRUENAS}" in ${OP_VAULT} vault
#       ↓ (1Password Operator syncs every 60s)
#   Kubernetes Secret "truenas-api-key" in democratic-csi namespace
#       ↓ (HelmRelease valuesFrom injects at targetPath)
#   democratic-csi driver config → httpConnection.apiKey
#       ↓ (controller uses it to call TrueNAS REST API)
#   TrueNAS creates/deletes ZFS datasets and NFS/iSCSI shares
#
#   At no point does the API key appear in Git. It flows:
#   1Password → K8s Secret → Helm values (in-memory) → API call
# ══════════════════════════════════════════════════════════════════
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: truenas-api-key
  namespace: democratic-csi
  labels:
    app.kubernetes.io/part-of: democratic-csi
    app.kubernetes.io/managed-by: flux
spec:
  itemPath: "vaults/${OP_VAULT}/items/${OP_ITEM_TRUENAS}"
