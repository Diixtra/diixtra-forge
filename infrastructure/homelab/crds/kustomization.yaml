apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # HelmRepositories + Image Automation — no CRD dependencies
  - ../../base/flux-addons
  # CRD providers — these HelmReleases install the CRDs that
  # other infrastructure resources depend on.
  - ../../base/onepassword-operator
  - ../../base/cilium
  # VolumeSnapshot CRDs — kubeadm doesn't ship these.
  # Required before democratic-csi HelmReleases can create VolumeSnapshotClass resources.
  - ../../base/volume-snapshot-crds
  # Crossplane — installs core CRDs (XRDs, Compositions, Providers, Functions, etc.)
  - ../../base/crossplane
