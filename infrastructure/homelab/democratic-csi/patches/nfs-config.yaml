# ══════════════════════════════════════════════════════════════════
# Homelab NFS Configuration Patch
# ══════════════════════════════════════════════════════════════════
# Overrides base HelmRelease with homelab-specific TrueNAS paths.
# Base uses OVERRIDE_IN_ENV_PATCH placeholders — this is where
# the actual environment values go.
#
# ZFS path format: <pool>/<dataset>/<subdirectory>
# Maps to TrueNAS: /mnt/<pool>/<dataset>/<subdirectory>
# ══════════════════════════════════════════════════════════════════
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: truenas-nfs
  namespace: democratic-csi
spec:
  values:
    driver:
      config:
        zfs:
          datasetParentName: kaz.cloud/kozmox/k8/nfs/vols
          detachedSnapshotsDatasetParentName: kaz.cloud/kozmox/k8/nfs/snaps
