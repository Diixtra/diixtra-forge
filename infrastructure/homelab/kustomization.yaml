apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # CRD-dependent resources — these all need CRDs installed by
  # infrastructure-crds (OnePasswordItem from 1Password Operator,
  # CiliumLoadBalancerIPPool/CiliumL2AnnouncementPolicy from Cilium).
  - ../base/traefik
  - ../base/democratic-csi
  - ../base/github-actions-runner
  - ../base/packer-runner
  - ../base/nvidia-device-plugin
  - ../base/flux-operator
  # Cilium L2 announcements — need Cilium CRDs from infrastructure-crds
  - cilium/l2-config.yaml
patches:
  # TrueNAS dataset paths — homelab uses kaz.cloud pool
  - target:
      kind: HelmRelease
      name: truenas-nfs
      namespace: democratic-csi
    path: democratic-csi/patches/nfs-config.yaml
  - target:
      kind: HelmRelease
      name: truenas-iscsi
      namespace: democratic-csi
    path: democratic-csi/patches/iscsi-config.yaml
