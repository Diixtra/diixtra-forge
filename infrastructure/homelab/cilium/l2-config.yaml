---
# CiliumLoadBalancerIPPool — allocatable IPs for LoadBalancer Services
# Traefik is pinned to 10.2.0.200 via io.cilium/lb-ipam-ips annotation
# NOTE: v2alpha1 API — may require migration on Cilium upgrades
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: homelab-pool
spec:
  blocks:
    - start: "10.2.0.200"
      stop: "10.2.0.210"
---
# CiliumL2AnnouncementPolicy — responds to ARP on the LAN for virtual IPs
# NOTE: v2alpha1 API — may require migration on Cilium upgrades
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: homelab-l2
spec:
  loadBalancerIPs: true
  externalIPs: true
  interfaces:
    - ^e(th|ns|np)[0-9]+
